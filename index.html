let _cu=null, _cm=null, _leads=[];

async function loadClientDash(user) {
  _cu=user;

  // Carrega act_ID do perfil
  if(user.meta_account_id && user.meta_account_id.startsWith('act_')) {
    MetaAds.saveClientConfig(user.id,{actId:user.meta_account_id,datePreset:'last_30d'});
  }

  // Sync métricas
  await MetaAds.sync(user.id);
  _cm = await DataLayer.getMetrics(user.id);

  // Notificações
  const unread = await Notifications.load(user.id);

  renderMetricCards();
  await renderOverviewCharts();
  renderHistoryTable();
  _leads = await DataLayer.getLeads(user.id);
  renderLeadsTable(_leads);
  updateSyncLabel();
  updateNotifBadge(unread);
  checkGoodMetrics();
  checkSatisfactionPopup();

  MetaAds.startAutoSync(user.id, async(_m, isReal)=>{
    _cm = await DataLayer.getMetrics(user.id);
    renderMetricCards();
    await renderOverviewCharts();
    renderHistoryTable();
    updateSyncLabel();
    Toast.gold(isReal?'Dados atualizados com dados reais':'Métricas atualizadas');
  });
  setInterval(updateSyncLabel,30000);
}

function updateNotifBadge(n){const b=document.getElementById('notif-badge');if(!b)return;const count=n??Notifications.unread;b.textContent=count;b.style.display=count>0?'flex':'none';}

function checkGoodMetrics(){
  if(!_cm||(!_cm.roas&&!_cm.ctr))return;

    el.innerHTML=`<div class="popup-header"><span class="popup-title">${Icon.award} Ótimos resultados!</span><button class="popup-close" onclick="document.getElementById('good-metrics-popup').remove()">${Icon.x}</button></div>

function checkSatisfactionPopup(){
  if(!_cu)return;
  const key='co_sat_'+_cu.id, last=parseInt(localStorage.getItem(key)||'0');

  setTimeout(()=>{
    if(document.getElementById('sat-popup'))return;
    const el=document.createElement('div');el.id='sat-popup';el.className='metrics-popup';
    el.style.cssText='right:24px;bottom:24px;width:300px';

    <div style="display:flex;gap:8px;justify-content:center;margin-bottom:10px">
      ${[1,2,3,4,5].map(n=>`<button onclick="rateSatisfaction(${n})" style="width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.05);border:1px solid var(--br-s);color:var(--blue-l);font-size:17px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif">${n}</button>`).join('')}

    document.body.appendChild(el);
  },6000);
}

function renderMetricCards(){
  const el=document.getElementById('metrics-grid');if(!el||!_cm)return;
  const cards=[
    {l:'Investimento em anúncios',  v:fmt.currency(_cm.spend),              sub:'Total investido',        icon:Icon.dollar,       d:_cm.spend>0?'Ativo':'R$0',    up:true},
    {l:'Cliques recebidos',         v:fmt.num(_cm.clicks),                  sub:'Pessoas que clicaram',   icon:Icon.mouse,        d:_cm.clicks>0?`${_cm.clicks}`:'0', up:true},
    {l:'Pessoas alcançadas',        v:fmt.big(_cm.impressions),             sub:'Visualizações do anúncio',icon:Icon.eye,         d:fmt.big(_cm.impressions),     up:true},
    {l:'Custo por clique (CPC)',    v:_cm.cpc>0?fmt.currency(_cm.cpc,true):'R$0,00',sub:'Preço médio de cada clique',icon:Icon.barChart,d:'CPC',up:true},
    {l:'Taxa de clique (CTR)',      v:(_cm.ctr||0).toFixed(2)+'%',          sub:'% de quem viu e clicou', icon:Icon.target,       d:(_cm.ctr||0)>=2?'Bom':'—',    up:(_cm.ctr||0)>=2},
    {l:'Leads / Mensagens',         v:fmt.num(_cm.leads),                   sub:'Contatos gerados',       icon:Icon.users,        d:_cm.leads>0?`${_cm.leads}`:'0', up:true},
    {l:'Vendas / Agendamentos',     v:fmt.num(_cm.sales),                   sub:'Conversões realizadas',  icon:Icon.shoppingCart, d:_cm.sales>0?`${_cm.sales}`:'0', up:true},
    {l:'Retorno sobre investimento', v:_cm.roas>0?(_cm.roas).toFixed(2)+'×':'0×', sub:'Para cada R$1 investido',icon:Icon.award,d:_cm.roas>=2?'Saudável':'—',up:_cm.roas>=2}
  ];
  const wk=_cm.rows?.length?_cm.rows.slice(0,7).reverse().map(r=>r.clicks||0):[0,0,0,0,0,0,0];
  const wkMax=Math.max(...wk,1);
  el.innerHTML=cards.map(c=>{
    const spark=wk.map((v,i)=>`<div class="spark-bar${i===wk.length-1?' hi':''}" style="height:${Math.max(3,Math.round(v/wkMax*18))}px"></div>`).join('');
    return `<div class="metric-card"><div class="mc-top"><span class="mc-label">${c.l}</span><div class="mc-icon">${c.icon}</div></div>
    <div class="metric-value">${c.v}</div><div class="mc-spark">${spark}</div>
    <div class="mc-footer"><span class="mc-sub">${c.sub}</span><span class="mc-delta ${c.up?'delta-up':'delta-down'}">${c.d}</span></div></div>`;
  }).join('');
}

function switchSection(s,btn){
  ['resumo','graficos'].forEach(t=>{document.getElementById('sec-'+t)?.classList.add('hidden');});

  document.querySelectorAll('.sec-tab').forEach(b=>b.classList.remove('active'));

async function renderOverviewCharts(){
  if(!_cm?.rows?.length)return;
  const rows=[..._cm.rows].sort((a,b)=>new Date(a.date)-new Date(b.date)).slice(-14);
  const labels=rows.map(r=>fmt.date(r.date));
  Charts.line('ch-clicks',{labels,aspectRatio:3,datasets:[{label:'Cliques',data:rows.map(r=>r.clicks||0),color:'#3B82F6'},{label:'Alcance (÷100)',data:rows.map(r=>Math.round((r.impressions||0)/100)),color:'#4E90D6'}]});
  Charts.bar('ch-spend',{labels,aspectRatio:3.5,yPrefix:'R$',datasets:[{label:'Investimento (R$)',data:rows.map(r=>+(r.spend||0).toFixed(2)),color:'#3DB874'}]});
  Charts.doughnut('ch-donut',{labels:['Cliques','Leads','Vendas'],data:[_cm.clicks||1,_cm.leads||0,_cm.sales||0],colors:['#3B82F6','#3DB874','#4E90D6']});
}

async function loadAdminDash(user) {
  await renderAdminGlobalMetrics();
  await refreshClients();
}

async function refreshClients(){
  const clients = await DataLayer.getAllClients();
  const total=clients.length, pending=clients.filter(u=>u.status==='pending').length, active=clients.filter(u=>u.status==='active').length;
  const s=(id,v)=>{const e=document.getElementById(id);if(e)e.textContent=v;};
  s('adm-total',total);s('adm-pending',pending);s('adm-active',active);
  const pb=document.getElementById('adm-pending-badge');
  if(pb){pb.textContent=pending;pb.style.display=pending>0?'inline-flex':'none';}
  const el=document.getElementById('adm-clients-tbody');if(!el)return;
  const sb={active:'badge-active',pending:'badge-pending',rejected:'badge-rejected'};
  const sl={active:'Ativo',pending:'Pendente',rejected:'Rejeitado'};
  el.innerHTML=clients.sort((a,b)=>{const o={pending:0,active:1,rejected:2};return(o[a.status]??1)-(o[b.status]??1);}).map(u=>{
    const hasAct=u.meta_account_id&&u.meta_account_id.startsWith('act_');
    return `<tr>
      <td><div style="display:flex;align-items:center;gap:10px">
        <div style="width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--blue-d));display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#0A0A0A;flex-shrink:0">${u.avatar_initials||'??'}</div>
        <div><div class="td-primary" style="font-size:13px">${u.name}</div><div style="font-size:10px;color:var(--t4)">${u.company||'—'}</div></div>
      </div></td>
      <td class="td-mono" style="font-size:11px">${u.email}</td>
      <td class="td-mono" style="font-size:11px">${u.whatsapp||'—'}</td>
      <td>${hasAct?`<span class="badge badge-active">${Icon.check} ${u.meta_account_id}</span>`:`<span class="badge badge-rejected">${Icon.x} Não configurado</span>`}</td>
      <td><span class="badge ${u.plan==='enterprise'?'badge-admin':u.plan==='pro'?'badge-pending':'badge-blue'}">${(u.plan||'starter').toUpperCase()}</span></td>
      <td><span class="badge ${sb[u.status]||'badge-pending'}">${sl[u.status]||u.status}</span></td>
      <td class="td-mono" style="font-size:10px">${new Date(u.created_at).toLocaleDateString('pt-BR')}</td>
      <td><div style="display:flex;gap:5px;flex-wrap:wrap">
        <button class="act-btn" style="background:rgba(59,130,246,0.1);color:var(--blue-l);border:1px solid var(--br-s)" onclick="openEditModal('${u.id}')">${Icon.settings} Config.</button>
        ${u.status!=='active'?`<button class="act-btn act-approve" onclick="adminAction('${u.id}','active')">${Icon.check} Aprovar</button>`:''}
        ${u.status!=='rejected'?`<button class="act-btn act-reject" onclick="adminAction('${u.id}','rejected')">${Icon.x} Rejeitar</button>`:''}
        <button class="act-btn act-delete" onclick="adminDelete('${u.id}','${u.name}')">${Icon.trash}</button>
      </div></td>
    </tr>`;
  }).join('')||`<tr><td colspan="8" style="text-align:center;color:var(--t4);padding:28px">Nenhum cliente cadastrado</td></tr>`;
}

        <div><label style="display:block;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--t4);margin-bottom:6px">Plano</label>
          <select class="api-input" id="edit-plan" style="width:100%"><option value="starter" ${u.plan==='starter'?'selected':''}>Starter</option><option value="pro" ${u.plan==='pro'?'selected':''}>Pro</option><option value="enterprise" ${u.plan==='enterprise'?'selected':''}>Enterprise</option></select>
        </div>
        <div><label style="display:block;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--t4);margin-bottom:6px">Status</label>
          <select class="api-input" id="edit-status" style="width:100%"><option value="pending" ${u.status==='pending'?'selected':''}>Pendente</option><option value="active" ${u.status==='active'?'selected':''}>Ativo</option><option value="rejected" ${u.status==='rejected'?'selected':''}>Rejeitado</option></select>

async function saveClientConfig(userId){
  const metaId=document.getElementById('edit-meta-id')?.value.trim();
  const whatsapp=document.getElementById('edit-whatsapp')?.value.trim();
  const plan=document.getElementById('edit-plan')?.value;
  const status=document.getElementById('edit-status')?.value;
  const actId=metaId?(metaId.startsWith('act_')?metaId:'act_'+metaId):'';
  await DataLayer.updateClient(userId,{meta_account_id:actId,whatsapp:whatsapp||'',plan:plan||'starter',status:status||'pending'});
  // Salva act_ID no localStorage para MetaAds usar
  MetaAds.saveClientConfig(userId,{actId,datePreset:'last_30d'});
  Modal.close();await refreshClients();
  Toast.success(`Cliente configurado! ${actId||'sem act_ID'}`);
}

async function adminAction(userId,status){
  await DataLayer.setClientStatus(userId,status);
  status==='active'?Toast.success('Cliente aprovado'):Toast.error('Cliente rejeitado');
  await refreshClients();
}

async function adminDelete(userId,name){
  const ok=await Modal.confirm({title:'Remover cliente',message:`Remover <strong>${name}</strong>? Esta ação não pode ser desfeita.`,confirmText:'Remover'});
  if(!ok)return;
  await DataLayer.setClientStatus(userId,'rejected');
  Toast.info('Cliente removido do acesso');
  await refreshClients();
}

let _admPeriod = 7;

function setAdminPeriod(days) {
  _admPeriod = days;
  // Update button states
  [7,15,30].forEach(d => {
    const btn = document.getElementById('adm-period-'+d);
    if (!btn) return;
    if (d === days) { btn.style.background='var(--blue)'; btn.style.color='#fff'; }
    else { btn.style.background='transparent'; btn.style.color='var(--t3)'; }
  });
  const lbl = document.getElementById('adm-chart-period-label');
  if (lbl) lbl.textContent = `Últimos ${days} dias`;
  renderAdminGlobalMetrics();
}

async function renderAdminGlobalMetrics() {
  const el = document.getElementById('adm-metrics-grid');
  if (!el) return;

  const clients = await DataLayer.getAllClients();
  const active  = clients.filter(u => u.status === 'active');
  const days    = _admPeriod || 7;

  let tSpend=0, tLeads=0, tClicks=0, tRevenue=0, tSales=0;
  const dayData = {}; // date → {spend, revenue, clicks}

  for (const u of active) {
    const m = await DataLayer.getMetrics(u.id, days);
    tSpend   += m.spend   || 0;
    tLeads   += m.leads   || 0;
    tClicks  += m.clicks  || 0;
    tRevenue += m.revenue || 0;
    tSales   += m.sales   || 0;
    (m.rows || []).forEach(r => {
      if (!dayData[r.date]) dayData[r.date] = { spend:0, revenue:0, clicks:0 };
      dayData[r.date].spend   += r.spend   || 0;
      dayData[r.date].revenue += r.revenue || 0;
      dayData[r.date].clicks  += r.clicks  || 0;
    });
  }

  const fC = v => v>=1e6?'R$'+(v/1e6).toFixed(2)+'M':v>=1e3?'R$'+(v/1e3).toFixed(1)+'K':'R$'+v.toFixed(2);
  const fN = v => v>=1e6?(v/1e6).toFixed(1)+'M':v>=1e3?(v/1e3).toFixed(1)+'K':String(Math.round(v));
  const avgRoas = tSpend > 0 ? (tRevenue/tSpend).toFixed(2) : '0.00';
  const totalClients = active.length;

  el.innerHTML = [
    { l:'Investimento Total', v:fC(tSpend),        i:Icon.dollar,    d:`${days} dias` },
    { l:'Total de Cliques',   v:fN(tClicks),        i:Icon.mouse,     d:`${days} dias` },
    { l:'Leads Gerados',      v:fN(tLeads),          i:Icon.users,     d:`${days} dias` },
    { l:'ROAS Médio',         v:avgRoas+'×',         i:Icon.award,     d:'Retorno médio' },
    { l:'Vendas / Planos',    v:fN(tSales),          i:Icon.shoppingCart, d:`${days} dias` },
    { l:'Clientes Ativos',    v:String(totalClients),i:Icon.shield,    d:'Total ativo' },
  ].map(c => `
    <div class="metric-card">
      <div class="mc-top"><span class="mc-label">${c.l}</span><div class="mc-icon">${c.i}</div></div>
      <div class="metric-value">${c.v}</div>
      <div class="mc-footer"><span class="mc-sub">${c.d}</span></div>
    </div>`).join('');

  // Build global chart
  const sortedDates = Object.keys(dayData).sort();
  const labels = sortedDates.map(d => {
    const dt = new Date(d+'T00:00:00');
    return dt.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});
  });

  if (sortedDates.length > 0 && window.Charts) {
    Charts.line('adm-global-chart', {
      labels: labels.length ? labels : ['Sem dados'],
      aspectRatio: 3.5,
      datasets: [
        { label:'Investimento (R$)', data: sortedDates.map(d=>(dayData[d]?.spend||0).toFixed(2)), color:'#3B82F6' },
        { label:'Receita estimada', data: sortedDates.map(d=>(dayData[d]?.revenue||0).toFixed(2)), color:'#22C55E' }
      ]
    });
    Charts.bar('adm-clicks-chart', {
      labels,
      aspectRatio: 2.5,
      datasets: [{ label:'Cliques', data: sortedDates.map(d=>dayData[d]?.clicks||0), color:'#60A5FA' }]
    });
  }

  // Plans distribution pie
  const planCounts = { trial:0, monthly:0, quarterly:0, other:0 };
  clients.forEach(u => {
    if(u.plan==='trial') planCounts.trial++;
    else if(u.plan==='monthly') planCounts.monthly++;
    else if(u.plan==='quarterly') planCounts.quarterly++;
    else planCounts.other++;
  });
  if (window.Charts) {
    Charts.doughnut('adm-plans-chart', {
      labels: ['Trial','Mensal','Trimestral','Outro'],

/* Token da BM */
async function loadSavedToken(){
  const saved = await DataLayer.getGlobalBMToken() || localStorage.getItem('co_bm_token')||'';
  const el=document.getElementById('global-bm-token');if(saved&&el){el.value=saved;onTokenInput(saved);}
  updateEndpointDisplay(document.getElementById('test-act-id')?.value||'');
}

function updateEndpointDisplay(actId){
  const ep=document.getElementById('endpoint-display');if(!ep)return;
  const acc=actId?(actId.startsWith('act_')?actId:'act_'+actId):'act_{ID}';
  ep.value=`https://graph.facebook.com/v19.0/${acc}/insights?fields=spend,clicks,impressions,cpc,ctr,date_start,date_stop&date_preset=last_30d`;
}

let _tokenTimer=null;
function onTokenInput(val){
  const msg=document.getElementById('token-valid-msg'),badge=document.getElementById('api-global-badge'),btn=document.getElementById('btn-save-token');
  clearTimeout(_tokenTimer);
  if(!val||val.length<20){if(msg)msg.innerHTML='<span style="color:var(--t4)">Cole o token acima</span>';return;}
  if(!val.startsWith('EAA')){if(msg)msg.innerHTML='<span style="color:var(--red)">Token deve começar com EAA</span>';return;}
  if(msg)msg.innerHTML='<span style="color:var(--t3)">Validando...</span>';
  _tokenTimer=setTimeout(async()=>{
    const r=await MetaAds.validateToken(val);
    if(r.ok){if(msg)msg.innerHTML=`<span style="color:var(--green)">✓ Válido — ${r.name}</span>`;if(badge){badge.textContent='✓ Válido';badge.className='badge badge-active';}if(btn)btn.disabled=false;}
    else{if(msg)msg.innerHTML=`<span style="color:var(--red)">✕ ${r.error}</span>`;if(badge){badge.textContent='Inválido';badge.className='badge badge-rejected';}if(btn)btn.disabled=true;}
  },900);
}

function toggleTokenVis(){const el=document.getElementById('global-bm-token');if(el)el.type=el.type==='password'?'text':'password';}

async function saveGlobalToken(){
  const token=document.getElementById('global-bm-token')?.value.trim();
  if(!token||!token.startsWith('EAA')){Toast.error('Token inválido');return;}
  await DataLayer.saveGlobalBMToken(token);
  localStorage.setItem('co_bm_token',token);
  Toast.success('Token salvo!');
}

async function testGlobalToken(){
  const token=document.getElementById('global-bm-token')?.value.trim()||await DataLayer.getGlobalBMToken();
  const actId=document.getElementById('test-act-id')?.value.trim()||'';
  const status=document.getElementById('bm-token-status'),box=document.getElementById('test-result-box');
  if(!token){Toast.error('Insira o token primeiro');return;}
  if(status)status.innerHTML=`<div class="api-dot dot-warn"></div><span style="font-size:11px">Testando...</span>`;
  if(box){box.style.display='block';box.innerHTML='Conectando...';}
  const r=await MetaAds.testConnection(actId||'000',token);
  if(r.ok){
    const msg=r.hasData?`Dados encontrados (${r.data.length} período)`:'Conectado — sem anúncios ativos no período (normal)';
    if(status)status.innerHTML=`<div class="api-dot dot-ok"></div><span style="font-size:11px">Conectado</span>`;
    if(box){box.style.cssText='display:block;padding:12px 14px;border-radius:var(--r-m);background:var(--green-bg);border:1px solid rgba(61,184,116,0.3);color:var(--green);font-size:12px;line-height:1.7;margin-bottom:14px';box.innerHTML=`<strong>✓ Conexão bem-sucedida!</strong><br>Token: ${r.tokenUser}<br>${actId?`Conta: ${r.accountName||actId}<br>`:''}${msg}`;}
    Toast.success('Meta Ads conectado!');
  } else {
    const stepMsg={token:'Verifique o token da BM',conta:'Adicione a conta em "Adicionar ativos" no System User',insights:'Verifique permissões ads_read e ads_management'};
    if(status)status.innerHTML=`<div class="api-dot dot-err"></div><span style="font-size:11px">Falhou</span>`;
    if(box){box.style.cssText='display:block;padding:12px 14px;border-radius:var(--r-m);background:var(--red-bg);border:1px solid rgba(224,80,80,0.3);color:var(--red);font-size:12px;line-height:1.7;margin-bottom:14px';box.innerHTML=`<strong>✕ Falhou — etapa: ${r.step}</strong><br>${r.error}<br><span style="font-size:11px;opacity:.8">${stepMsg[r.step]||''}</span>`;}
    Toast.error(`Falhou: ${r.error}`);
  }
}

async function refreshClientsPlans() {
  const clients = await DataLayer.getAllClients();
  const el = document.getElementById('adm-plans-tbody');
  if (!el) return;
  const planLabel = { trial:'15 dias grátis', monthly:'Mensal', quarterly:'Trimestral', starter:'Starter', pro:'Pro', enterprise:'Enterprise' };
  const planColor = { trial:'badge-blue', monthly:'badge-active', quarterly:'badge-admin', starter:'badge-blue', pro:'badge-pending', enterprise:'badge-admin' };
  el.innerHTML = clients.length ? clients.map(u => `
    <tr>
      <td class="td-primary">${u.name}</td>
      <td class="td-mono" style="font-size:11px">${u.email}</td>
      <td><span class="badge ${planColor[u.plan]||'badge-blue'}">${planLabel[u.plan]||u.plan}</span></td>
      <td><span class="badge ${u.status==='active'?'badge-active':u.status==='pending'?'badge-pending':'badge-rejected'}">${u.status==='active'?'Ativo':u.status==='pending'?'Pendente':'Rejeitado'}</span></td>
      <td>
        <select onchange="updateClientPlan('${u.id}',this.value)" style="background:var(--bg-3);border:1px solid var(--br-s);border-radius:var(--r-s);color:var(--t2);font-size:11px;padding:4px 8px;cursor:pointer">
          <option value="">Mudar plano</option>
          <option value="trial">Trial 15d</option>
          <option value="monthly">Mensal</option>
          <option value="quarterly">Trimestral</option>
        </select>
      </td>
    </tr>`).join('') :
    `<tr><td colspan="5" style="text-align:center;color:var(--t4);padding:20px">Nenhum cliente</td></tr>`;
}

async function updateClientPlan(userId, plan) {
  if (!plan) return;
  await DataLayer.updateClient(userId, { plan });
  Toast.success('Plano atualizado!');
  refreshClientsPlans();
}
window.refreshClientsPlans = refreshClientsPlans;
window.updateClientPlan    = updateClientPlan;

/* ══════════════════════════════════════════════
   APP CONTROLLER
══════════════════════════════════════════════ */
const App = (() => {
  function render(html){document.getElementById('app').innerHTML=html;}

  async function init(){
    document.body.insertAdjacentHTML('afterbegin',`<div id="loader"><div class="loader-brand">Comércios Online</div><div class="loader-tag">Performance Dashboard</div><div class="loader-bar"><div class="loader-fill"></div></div></div>`);
    setTimeout(async()=>{
      document.getElementById('loader')?.classList.add('out');
      setTimeout(()=>document.getElementById('loader')?.remove(),500);
      try {
        const user=await Auth.currentUser();
        if(user)routeUser(user);else navigate('login');
      } catch(e){console.error(e);navigate('login');}
    },1800);
  }

  function routeUser(user){
    if(!user)return navigate('login');
    if(user.role==='admin')navigate('admin',user);
    else if(user.status==='active')navigate('dashboard',user);
    else navigate('pending',user);
  }

  async function navigate(page,user){
    Charts?.destroyAll?.();
    switch(page){
      case 'login':render(renderLogin());setTimeout(initAuthAnimations,150);break;
      case 'pending':render(renderPending(user));break;
      case 'dashboard':render(clientDashHTML(user));await loadClientDash(user);break;
      case 'admin':render(adminDashHTML(user));await loadAdminDash(user);setTimeout(loadSavedToken,300);break;
    }
  }

  async function logout(){MetaAds?.stopAutoSync?.();await Auth.logout();Toast.info('Até logo!');setTimeout(()=>navigate('login'),300);}

  return {init,navigate,logout,routeUser};
})();

/* ── PLAN SELECTOR ── */
function selectPlan(el, plan) {
  document.querySelectorAll('.plan-card').forEach(c => {
    c.style.border = '1px solid var(--br-s)';
    c.style.background = 'transparent';
  });
  el.style.border = '1.5px solid var(--blue)';
  el.style.background = 'rgba(59,130,246,0.08)';
  const pi = document.getElementById('reg-plan');
  if (pi) pi.value = plan;
}

/* ── RESET PASSWORD ── */
function openResetModal()  { const m=document.getElementById('popup-reset'); if(m){m.style.display='flex';setTimeout(()=>document.getElementById('reset-email')?.focus(),100);} }
function closeResetModal() { const m=document.getElementById('popup-reset'); if(m) m.style.display='none'; }

async function _doResetPassword() {
  const email = document.getElementById('reset-email')?.value?.trim();
  const alertEl = document.getElementById('reset-alert');
  if(alertEl) alertEl.innerHTML = '';
  if(!email) { if(alertEl) alertEl.innerHTML='<div class="alert alert-error">Digite seu e-mail</div>'; return; }
  const btn = document.getElementById('btn-reset');
  if(btn) { btn.disabled=true; btn.textContent='Enviando...'; }
  try {
    const { error } = await getSB().auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin + '?reset=1'
    });
    if(error) throw new Error(error.message);
    if(alertEl) alertEl.innerHTML='<div class="alert" style="background:rgba(61,184,116,0.1);border:1px solid rgba(61,184,116,0.3);color:var(--green);padding:10px 14px;border-radius:8px;font-size:12px">✓ Link enviado! Verifique seu e-mail (incluindo spam).</div>';
    if(btn) { btn.textContent='Link enviado!'; }
  } catch(err) {
    if(alertEl) alertEl.innerHTML=`<div class="alert alert-error">${err.message}</div>`;
    if(btn) { btn.disabled=false; btn.textContent='Enviar link de recuperação'; }
  }
}

window.openResetModal  = openResetModal;
window.closeResetModal = closeResetModal;
window.selectPlan      = selectPlan;

window.App=App;
document.addEventListener('DOMContentLoaded',()=>App.init());






</script>
