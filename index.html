<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<meta name="theme-color" content="#080808">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Comércios Online — Dashboard</title>
<!-- Supabase JS SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<!-- Chart.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>/* ═══════════════════════════════════════════════
   COMÉRCIOS ONLINE — DESIGN SYSTEM v3
   Theme: Premium Black & Gold
   Numbers: Inter (clean, normalized)
   Display: Fraunces (editorial serif)
   Body: DM Sans
═══════════════════════════════════════════════ */

@import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=Inter:wght@400;500;600;700&display=swap');

:root {
  --gold:       #C9A84C;
  --gold-l:     #E8C96E;
  --gold-d:     #9A7A1E;
  --gold-shine: linear-gradient(135deg,#F0D980 0%,#C9A84C 45%,#8A6B15 100%);

  --bg:         #080808;
  --bg-2:       #0E0E0E;
  --bg-3:       #141414;
  --bg-4:       #1A1A1A;
  --bg-5:       #222222;
  --bg-6:       #2C2C2C;

  --t1: #F4EFE6;
  --t2: #C0B08A;
  --t3: #7A6F58;
  --t4: #3E3730;

  --green:      #3DB874;
  --green-bg:   rgba(61,184,116,0.10);
  --red:        #E05050;
  --red-bg:     rgba(224,80,80,0.10);
  --blue:       #4E90D6;
  --blue-bg:    rgba(78,144,214,0.10);
  --amber:      #E8A832;

  --br-s: rgba(201,168,76,0.10);
  --br:   rgba(201,168,76,0.20);
  --br-m: rgba(201,168,76,0.38);
  --br-g: rgba(201,168,76,0.55);

  --sidebar-w: 248px;
  --topbar-h:  60px;
  --r-s: 6px;
  --r-m: 10px;
  --r-l: 14px;
  --r-xl: 20px;
}

*,*::before,*::after { box-sizing:border-box; margin:0; padding:0 }
html { scroll-behavior:smooth; }
body {
  font-family:'DM Sans',system-ui,sans-serif;
  background:var(--bg); color:var(--t1);
  min-height:100vh; overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
}
a { color:var(--gold); text-decoration:none }
button { font-family:'DM Sans',sans-serif; cursor:pointer; border:none; outline:none }
input,select,textarea { font-family:'DM Sans',sans-serif; outline:none }
svg { flex-shrink:0 }

/* Numbers always Inter */
.num, .metric-value, .stat-num, td.mono, .mono {
  font-family:'Inter',sans-serif;
}

::-webkit-scrollbar { width:4px; height:4px }
::-webkit-scrollbar-track { background:transparent }
::-webkit-scrollbar-thumb { background:var(--bg-6); border-radius:4px }
::-webkit-scrollbar-thumb:hover { background:var(--gold-d) }

/* ── UTILS ── */
.hidden { display:none !important }

/* ══════════════════════════════════════════
   LOADER
══════════════════════════════════════════ */
#loader {
  position:fixed; inset:0; z-index:9999;
  background:var(--bg);
  display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:28px;
  transition:opacity 0.5s,visibility 0.5s;
}
#loader.out { opacity:0; visibility:hidden }
.loader-brand {
  font-family:'Fraunces',serif;
  font-size:32px; font-weight:300; letter-spacing:3px;
  background:var(--gold-shine);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  background-clip:text;
}
.loader-tag {
  font-size:10px; letter-spacing:5px; text-transform:uppercase;
  color:var(--t3); margin-top:-22px;
}
.loader-bar {
  width:180px; height:1px; background:var(--bg-5); border-radius:1px; overflow:hidden;
}
.loader-fill {
  height:100%;
  background:linear-gradient(90deg,var(--gold-d),var(--gold),var(--gold-l));
  animation:lfill 1.8s cubic-bezier(.4,0,.2,1) forwards;
}
@keyframes lfill { from{width:0} to{width:100%} }

/* ══════════════════════════════════════════
   AUTH LAYOUT
══════════════════════════════════════════ */
.auth-scene {
  display:grid; grid-template-columns:1fr 1fr;
  min-height:100vh; background:var(--bg);
}
@media(max-width:860px){ .auth-scene{grid-template-columns:1fr} }

/* LEFT PANEL */
.auth-left {
  position:relative; overflow:hidden;
  background:var(--bg-2);
  border-right:1px solid var(--br-s);
  display:flex; flex-direction:column;
  justify-content:space-between; padding:44px;
}
.auth-left-bg {
  position:absolute; inset:0; pointer-events:none;
  background:
    radial-gradient(ellipse 65% 45% at 15% 55%,rgba(201,168,76,0.07) 0%,transparent 65%),
    radial-gradient(ellipse 40% 60% at 85% 15%,rgba(201,168,76,0.04) 0%,transparent 55%);
}
/* Animated grid */
.auth-grid {
  position:absolute; inset:0; pointer-events:none;
  background-image:
    linear-gradient(rgba(201,168,76,0.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(201,168,76,0.04) 1px,transparent 1px);
  background-size:48px 48px;
}
/* Cursor glow effect */
.cursor-glow {
  position:fixed; pointer-events:none; z-index:1;
  width:400px; height:400px; border-radius:50%;
  background:radial-gradient(circle,rgba(201,168,76,0.06) 0%,transparent 70%);
  transform:translate(-50%,-50%);
  transition:left 0.08s,top 0.08s;
  display:none;
}
.auth-left:hover .cursor-glow { display:block }

/* Floating particles */
.auth-particles { position:absolute; inset:0; pointer-events:none; overflow:hidden }
.particle {
  position:absolute; border-radius:50%;
  background:rgba(201,168,76,0.15);
  animation:float-p linear infinite;
}
@keyframes float-p {
  0%   { transform:translateY(100vh) scale(0); opacity:0 }
  10%  { opacity:1 }
  90%  { opacity:0.5 }
  100% { transform:translateY(-10vh) scale(1); opacity:0 }
}

.auth-brand-wrap { position:relative; z-index:2 }
.auth-brand-name {
  font-family:'Fraunces',serif;
  font-size:24px; font-weight:300; letter-spacing:1.5px; color:var(--t1);
}
.auth-brand-name em { font-style:italic; color:var(--gold) }
.auth-brand-tag {
  font-size:10px; letter-spacing:4px; text-transform:uppercase;
  color:var(--t3); margin-top:4px;
}

.auth-hero { position:relative; z-index:2 }
.auth-headline {
  font-family:'Fraunces',serif;
  font-size:48px; font-weight:300; line-height:1.08; color:var(--t1);
  margin-bottom:18px;
}
.auth-headline strong {
  font-weight:600;
  background:var(--gold-shine);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  background-clip:text;
}
.auth-desc { font-size:14px; color:var(--t3); line-height:1.7; max-width:380px; margin-bottom:36px }

/* Stats row */
.auth-kpis { display:grid; grid-template-columns:repeat(3,1fr); gap:16px }
.auth-kpi {
  padding:16px; background:rgba(255,255,255,0.02);
  border:1px solid var(--br-s); border-radius:var(--r-m);
}
.auth-kpi-val {
  font-family:'Inter',sans-serif;
  font-size:22px; font-weight:700; color:var(--gold);
  margin-bottom:3px;
}
.auth-kpi-label { font-size:10px; color:var(--t3); text-transform:uppercase; letter-spacing:0.8px }

/* Feature pills */
.auth-features { display:flex; flex-wrap:wrap; gap:8px; margin-top:24px }
.auth-feat-pill {
  display:flex; align-items:center; gap:6px;
  padding:6px 12px;
  background:rgba(201,168,76,0.06);
  border:1px solid var(--br-s); border-radius:20px;
  font-size:11px; color:var(--t3);
}
.auth-feat-pill svg { color:var(--gold); opacity:0.8 }

.auth-left-footer { position:relative; z-index:2; font-size:11px; color:var(--t4) }

/* RIGHT PANEL */
.auth-right {
  display:flex; align-items:center; justify-content:center;
  padding:44px 40px; background:var(--bg);
}
@media(max-width:860px){ .auth-right{padding:32px 24px} }
.auth-form-wrap { width:100%; max-width:400px }

.auth-form-title {
  font-family:'Fraunces',serif;
  font-size:30px; font-weight:300; letter-spacing:0.3px;
  color:var(--t1); margin-bottom:5px;
}
.auth-form-sub { font-size:13px; color:var(--t3); margin-bottom:32px; line-height:1.5 }

/* greeting banner */
.auth-greeting {
  padding:12px 16px; margin-bottom:20px;
  background:rgba(201,168,76,0.06); border:1px solid var(--br-s); border-radius:var(--r-m);
  font-size:13px; color:var(--gold); font-weight:500;
}

.form-group { margin-bottom:16px }
.form-label {
  display:block; font-size:11px; font-weight:600;
  letter-spacing:1px; text-transform:uppercase;
  color:var(--t3); margin-bottom:7px;
}
.form-input {
  width:100%; padding:12px 14px;
  background:var(--bg-3); border:1px solid var(--br-s);
  border-radius:var(--r-m); color:var(--t1); font-size:14px;
  transition:border-color .2s,box-shadow .2s,background .2s;
}
.form-input::placeholder { color:var(--t4) }
.form-input:focus {
  border-color:var(--gold-d);
  background:var(--bg-4);
  box-shadow:0 0 0 3px rgba(201,168,76,0.07);
}
.form-grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:12px }

/* BTN GOLD */
.btn-gold {
  width:100%; padding:13px;
  background:linear-gradient(135deg,var(--gold) 0%,var(--gold-d) 100%);
  border:none; border-radius:var(--r-m);
  color:#0A0A0A; font-size:13px; font-weight:600;
  letter-spacing:0.4px; text-transform:uppercase;
  transition:opacity .2s,transform .15s,box-shadow .2s;
  box-shadow:0 4px 18px rgba(201,168,76,0.18);
  position:relative; overflow:hidden;
}
.btn-gold::before {
  content:''; position:absolute; inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,0.12) 0%,transparent 55%);
}
.btn-gold:hover { opacity:.9; transform:translateY(-1px); box-shadow:0 6px 28px rgba(201,168,76,0.28) }
.btn-gold:active { transform:translateY(0) }
.btn-gold:disabled { opacity:.4; cursor:not-allowed; transform:none }
.btn-gold.compact { width:auto; padding:10px 22px }

.btn-outline {
  padding:10px 22px; background:transparent;
  border:1px solid var(--br); border-radius:var(--r-m);
  color:var(--gold); font-size:13px; font-weight:500;
  transition:all .2s;
}
.btn-outline:hover { background:rgba(201,168,76,0.07); border-color:var(--br-m) }

.btn-ghost {
  display:inline-flex; align-items:center; gap:6px;
  padding:8px 14px; background:rgba(255,255,255,0.04);
  border:1px solid var(--br-s); border-radius:var(--r-s);
  color:var(--t2); font-size:12px; font-weight:400;
  transition:all .2s;
}
.btn-ghost:hover { background:rgba(255,255,255,0.07); color:var(--t1) }
.btn-ghost svg { opacity:.7 }

.btn-icon {
  width:34px; height:34px; display:inline-flex;
  align-items:center; justify-content:center;
  background:rgba(255,255,255,0.03); border:1px solid var(--br-s);
  border-radius:var(--r-s); color:var(--t2); font-size:14px;
  transition:all .2s; position:relative;
}
.btn-icon:hover { background:rgba(255,255,255,0.07); color:var(--t1) }

.form-footer { margin-top:20px; text-align:center; font-size:13px; color:var(--t3) }
.form-footer a { color:var(--gold); cursor:pointer }
.form-footer a:hover { color:var(--gold-l) }

.alert { padding:11px 14px; border-radius:var(--r-s); font-size:13px; margin-bottom:16px; line-height:1.5 }
.alert-error { background:var(--red-bg); border:1px solid rgba(224,80,80,0.25); color:var(--red) }
.alert-success { background:var(--green-bg); border:1px solid rgba(61,184,116,0.25); color:var(--green) }
.alert-info { background:rgba(201,168,76,0.07); border:1px solid var(--br-s); color:var(--gold) }

.demo-box {
  margin-top:22px; padding:14px 16px;
  background:rgba(201,168,76,0.04); border:1px solid var(--br-s);
  border-radius:var(--r-m);
}
.demo-box-title {
  font-size:9px; font-weight:700; letter-spacing:1.8px; text-transform:uppercase;
  color:var(--gold-d); margin-bottom:10px;
}
.demo-row { display:flex; justify-content:space-between; margin-bottom:6px; align-items:center }
.demo-row:last-child { margin-bottom:0 }
.demo-label { font-size:11px; color:var(--t4) }
.demo-cred {
  font-family:'Inter',sans-serif; font-size:11px; color:var(--t3);
  cursor:pointer; transition:color .15s;
}
.demo-cred:hover { color:var(--gold) }

/* ══════════════════════════════════════════
   PENDING
══════════════════════════════════════════ */
.pending-scene {
  min-height:100vh; display:flex; align-items:center; justify-content:center;
  background:var(--bg); position:relative; overflow:hidden;
  padding:24px;
}
.pending-scene::before {
  content:''; position:absolute; inset:0;
  background:radial-gradient(ellipse 50% 40% at 50% 50%,rgba(201,168,76,0.05) 0%,transparent 70%);
  pointer-events:none;
}
.pending-card {
  position:relative; z-index:2;
  max-width:500px; width:100%;
  background:var(--bg-2); border:1px solid var(--br);
  border-radius:var(--r-xl); padding:52px 44px; text-align:center;
  box-shadow:0 0 0 1px var(--br-s),0 24px 64px rgba(0,0,0,0.5);
}
@media(max-width:480px){ .pending-card{padding:32px 20px} }
.pending-icon {
  width:72px; height:72px; margin:0 auto 24px;
  border-radius:50%; background:rgba(201,168,76,0.08);
  border:1px solid var(--br); display:flex; align-items:center; justify-content:center;
  animation:float 3s ease-in-out infinite; color:var(--gold);
}
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
.pending-title {
  font-family:'Fraunces',serif; font-size:28px; font-weight:300;
  color:var(--t1); margin-bottom:12px;
}
.pending-body { font-size:14px; color:var(--t3); line-height:1.7; margin-bottom:28px }
.pending-steps { display:flex; flex-direction:column; gap:8px; text-align:left; margin-bottom:28px }
.pending-step {
  display:flex; align-items:flex-start; gap:12px;
  padding:12px 14px; background:rgba(255,255,255,0.02);
  border:1px solid var(--br-s); border-radius:var(--r-s);
}
.pending-step-icon { color:var(--gold); flex-shrink:0; margin-top:1px }
.pending-step-text { font-size:13px; color:var(--t2) }

/* ══════════════════════════════════════════
   DASHBOARD LAYOUT
══════════════════════════════════════════ */
.dash-scene { display:flex; height:100vh; overflow:hidden; background:var(--bg) }

/* SIDEBAR */
.sidebar {
  width:var(--sidebar-w); flex-shrink:0;
  height:100vh; position:sticky; top:0;
  background:var(--bg-2); border-right:1px solid var(--br-s);
  display:flex; flex-direction:column;
  transition:width .28s cubic-bezier(.4,0,.2,1);
  overflow:hidden; z-index:100;
}
.sidebar.collapsed { width:60px }

.sb-header {
  height:var(--topbar-h); padding:0 16px;
  display:flex; align-items:center; gap:11px;
  border-bottom:1px solid var(--br-s); flex-shrink:0;
  min-height:var(--topbar-h);
}
.sb-logo {
  width:30px; height:30px; flex-shrink:0;
  background:linear-gradient(135deg,var(--gold),var(--gold-d));
  border-radius:7px; display:flex; align-items:center; justify-content:center;
  font-family:'Fraunces',serif; font-size:14px; font-weight:700; color:#0A0A0A;
}
.sb-brand { overflow:hidden; transition:opacity .2s,width .3s; white-space:nowrap }
.sidebar.collapsed .sb-brand { opacity:0; width:0 }
.sb-brand-name {
  font-family:'Fraunces',serif; font-size:15px; font-weight:300;
  color:var(--t1); white-space:nowrap;
}
.sb-brand-name em { font-style:italic; color:var(--gold) }
.sb-brand-ver { font-size:9px; color:var(--t4); letter-spacing:.5px; font-family:'Inter',sans-serif }

.sb-nav { flex:1; overflow-y:auto; overflow-x:hidden; padding:10px 8px }
.sb-group { margin-bottom:4px }
.sb-group-label {
  font-size:9px; font-weight:700; letter-spacing:1.8px; text-transform:uppercase;
  color:var(--t4); padding:10px 10px 5px; white-space:nowrap;
  transition:opacity .2s;
}
.sidebar.collapsed .sb-group-label { opacity:0 }

.sb-item {
  display:flex; align-items:center; gap:9px;
  padding:9px 10px; border-radius:var(--r-s);
  cursor:pointer; position:relative;
  color:var(--t3); font-size:13px; font-weight:400;
  white-space:nowrap; overflow:hidden;
  transition:background .15s,color .15s;
  margin-bottom:1px;
}
.sb-item:hover { background:rgba(255,255,255,0.04); color:var(--t2) }
.sb-item.active { background:rgba(201,168,76,0.08); color:var(--gold) }
.sb-item.active::before {
  content:''; position:absolute; left:0; top:50%; transform:translateY(-50%);
  width:3px; height:18px;
  background:linear-gradient(180deg,var(--gold),var(--gold-d));
  border-radius:0 3px 3px 0;
}
.sb-item svg { flex-shrink:0; width:15px; height:15px; opacity:.8 }
.sb-item.active svg { opacity:1 }
.sb-item-text { transition:opacity .2s; overflow:hidden }
.sidebar.collapsed .sb-item-text { opacity:0; width:0 }

.sb-badge {
  margin-left:auto; padding:1px 6px;
  background:rgba(201,168,76,0.15); color:var(--gold);
  font-size:9px; font-weight:700; font-family:'Inter',sans-serif;
  border-radius:20px; transition:opacity .2s;
}
.sidebar.collapsed .sb-badge { opacity:0 }

.sb-footer { padding:8px 8px 10px; border-top:1px solid var(--br-s); flex-shrink:0 }
.sb-user {
  display:flex; align-items:center; gap:9px;
  padding:9px 10px; border-radius:var(--r-s);
  cursor:pointer; overflow:hidden; margin-bottom:4px;
  transition:background .15s;
}
.sb-user:hover { background:rgba(255,255,255,0.04) }
.sb-avatar {
  width:32px; height:32px; flex-shrink:0;
  border-radius:50%; display:flex; align-items:center; justify-content:center;
  font-family:'Inter',sans-serif; font-size:11px; font-weight:700;
  color:#0A0A0A;
  background:linear-gradient(135deg,var(--gold),var(--gold-d));
  border:1px solid rgba(201,168,76,0.3);
}
.sb-user-info { overflow:hidden; transition:opacity .2s }
.sidebar.collapsed .sb-user-info { opacity:0; width:0 }
.sb-user-name { font-size:12px; font-weight:500; color:var(--t2); white-space:nowrap }
.sb-user-role { font-size:10px; color:var(--t4); font-family:'Inter',sans-serif }

.sb-collapse-btn {
  display:flex; align-items:center; justify-content:center; gap:5px;
  width:100%; padding:7px; background:transparent;
  border:1px solid var(--br-s); border-radius:var(--r-s);
  color:var(--t4); font-size:11px; transition:all .2s; cursor:pointer;
}
.sb-collapse-btn:hover { border-color:var(--br); color:var(--gold) }
.sb-collapse-icon { transition:transform .3s }
.sidebar.collapsed .sb-collapse-icon { transform:rotate(180deg) }
.sb-collapse-text { transition:opacity .2s; white-space:nowrap }
.sidebar.collapsed .sb-collapse-text { opacity:0; width:0; overflow:hidden }

/* MAIN */
.main-area { flex:1; min-width:0; display:flex; flex-direction:column; overflow:hidden }

.topbar {
  height:var(--topbar-h); flex-shrink:0;
  background:var(--bg-2); border-bottom:1px solid var(--br-s);
  display:flex; align-items:center; justify-content:space-between;
  padding:0 24px; position:sticky; top:0; z-index:50;
}
.topbar-left { display:flex; align-items:center; gap:8px }
.topbar-section { font-size:11px; color:var(--t4) }
.topbar-sep { color:var(--t4); font-size:12px }
.topbar-title { font-family:'Fraunces',serif; font-size:17px; font-weight:300; color:var(--t1) }
.topbar-right { display:flex; align-items:center; gap:10px }

/* Mobile hamburger */
.mobile-menu-btn {
  display:none; width:36px; height:36px;
  align-items:center; justify-content:center;
  background:transparent; border:1px solid var(--br-s); border-radius:var(--r-s);
  color:var(--t2); cursor:pointer; transition:all .2s;
}
.mobile-menu-btn:hover { color:var(--t1); border-color:var(--br) }
@media(max-width:768px){ .mobile-menu-btn{ display:flex } }

/* Sidebar mobile overlay */
.sb-overlay {
  display:none; position:fixed; inset:0; z-index:99;
  background:rgba(0,0,0,0.6); backdrop-filter:blur(2px);
}
.sb-overlay.visible { display:block }
@media(max-width:768px){
  .dash-scene { flex-direction:column }
  .sidebar {
    position:fixed; left:0; top:0; z-index:100;
    transform:translateX(-100%); transition:transform .3s;
    height:100%; width:var(--sidebar-w) !important;
  }
  .sidebar.mobile-open { transform:translateX(0) }
  .main-area { width:100%; height:100vh; overflow:hidden }
}

.status-pill {
  display:inline-flex; align-items:center; gap:5px;
  padding:5px 12px; border-radius:20px; font-size:11px; font-weight:600;
  font-family:'Inter',sans-serif; letter-spacing:.2px;
}
.pill-active { background:var(--green-bg); color:var(--green); border:1px solid rgba(61,184,116,0.2) }
.pill-active-dot { width:6px; height:6px; border-radius:50%; background:var(--green); box-shadow:0 0 5px var(--green); animation:blink 2s infinite }
.pill-pending { background:rgba(201,168,76,0.1); color:var(--gold); border:1px solid var(--br-s) }
.pill-admin { background:rgba(201,168,76,0.12); color:var(--gold-l); border:1px solid var(--br) }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }

.sync-btn {
  display:inline-flex; align-items:center; gap:6px;
  padding:7px 14px; background:rgba(201,168,76,0.05);
  border:1px solid var(--br); border-radius:var(--r-s);
  color:var(--gold); font-size:12px; font-weight:500; transition:all .2s;
}
.sync-btn:hover { background:rgba(201,168,76,0.1); border-color:var(--br-m) }
.sync-btn .sync-icon { display:inline-block; transition:transform .1s }
.sync-btn.spinning .sync-icon { animation:spin .8s linear infinite }
@keyframes spin { to{transform:rotate(360deg)} }

/* CONTENT */
.content-scroll { flex:1; overflow-y:auto; overflow-x:hidden }
.content-pad { padding:24px }
@media(max-width:768px){ .content-pad{padding:16px} }

.page-header { margin-bottom:24px }
.page-title { font-family:'Fraunces',serif; font-size:26px; font-weight:300; color:var(--t1); margin-bottom:4px }
.page-title strong { font-weight:600; color:var(--gold) }
.page-subtitle { font-size:12px; color:var(--t3) }
.page-actions { display:flex; align-items:center; gap:8px; margin-top:14px; flex-wrap:wrap }

/* welcome banner */
.welcome-banner {
  padding:14px 18px; margin-bottom:20px;
  background:linear-gradient(135deg,rgba(201,168,76,0.06),rgba(201,168,76,0.02));
  border:1px solid var(--br-s); border-radius:var(--r-m);
  display:flex; align-items:center; justify-content:space-between; gap:12px;
}
.welcome-text { font-size:14px; color:var(--t2) }
.welcome-text strong { color:var(--t1) }
.welcome-meta { font-size:11px; color:var(--t3); font-family:'Inter',sans-serif }

/* ══════════════════════════════════════════
   METRIC CARDS
══════════════════════════════════════════ */
.metrics-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(170px,1fr));
  gap:12px; margin-bottom:20px;
}
@media(max-width:600px){ .metrics-grid{grid-template-columns:repeat(2,1fr)} }
@media(max-width:340px){ .metrics-grid{grid-template-columns:1fr} }

.metric-card {
  background:var(--bg-2); border:1px solid var(--br-s); border-radius:var(--r-l);
  padding:18px 16px 14px; position:relative; overflow:hidden;
  transition:border-color .2s,transform .2s,box-shadow .2s; cursor:default;
}
.metric-card:hover { border-color:var(--br); transform:translateY(-2px); box-shadow:0 8px 28px rgba(0,0,0,0.3) }
.metric-card::after {
  content:''; position:absolute; top:0; left:0; right:0; height:2px;
  background:linear-gradient(90deg,transparent,var(--gold-d) 30%,var(--gold) 70%,transparent);
  opacity:.6;
}
.mc-top { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:8px }
.mc-label { font-size:10px; font-weight:600; letter-spacing:1px; text-transform:uppercase; color:var(--t4) }
.mc-icon {
  width:26px; height:26px; border-radius:6px;
  background:rgba(255,255,255,0.04); border:1px solid var(--br-s);
  display:flex; align-items:center; justify-content:center;
  color:var(--t3);
}
.mc-icon svg { width:13px; height:13px }
.metric-value {
  font-family:'Inter',sans-serif; font-size:28px; font-weight:700;
  color:var(--t1); line-height:1; margin-bottom:6px; letter-spacing:-0.5px;
}
.mc-footer { display:flex; align-items:center; justify-content:space-between }
.mc-sub { font-size:10px; color:var(--t4) }
.mc-delta {
  display:inline-flex; align-items:center; gap:3px;
  font-size:10px; font-weight:700; font-family:'Inter',sans-serif;
  padding:2px 7px; border-radius:20px;
}
.mc-delta svg { width:9px; height:9px }
.delta-up { background:var(--green-bg); color:var(--green) }
.delta-down { background:var(--red-bg); color:var(--red) }
.mc-spark { display:flex; align-items:flex-end; gap:2px; height:20px; margin-top:6px }
.spark-bar {
  flex:1; border-radius:2px 2px 0 0; background:var(--bg-5); min-height:3px;
  transition:background .3s;
}
.spark-bar.hi { background:var(--gold) }

/* shimmer */
.shimmer {
  background:linear-gradient(90deg,var(--bg-5) 25%,var(--bg-4) 50%,var(--bg-5) 75%);
  background-size:200%; animation:shimmer 1.4s infinite;
  border-radius:4px; color:transparent;
}
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

/* ══════════════════════════════════════════
   CHARTS
══════════════════════════════════════════ */
.charts-row { display:grid; grid-template-columns:2fr 1fr; gap:12px; margin-bottom:12px }
@media(max-width:1000px){ .charts-row{grid-template-columns:1fr} }
.chart-card {
  background:var(--bg-2); border:1px solid var(--br-s); border-radius:var(--r-l); padding:18px;
}
.chart-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px }
.chart-title { font-size:12px; font-weight:500; color:var(--t2) }
.chart-badge {
  font-size:9px; font-weight:700; font-family:'Inter',sans-serif;
  padding:2px 8px; border-radius:20px; letter-spacing:.3px;
}
.badge-live { background:var(--green-bg); color:var(--green) }
.badge-api { background:rgba(201,168,76,0.1); color:var(--gold) }

/* ══════════════════════════════════════════
   TABLES
══════════════════════════════════════════ */
.table-card {
  background:var(--bg-2); border:1px solid var(--br-s);
  border-radius:var(--r-l); overflow:hidden; margin-bottom:16px;
}
.table-card-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 18px; border-bottom:1px solid var(--br-s);
}
.table-card-title { font-size:12px; font-weight:500; color:var(--t2) }
.table-actions { display:flex; gap:6px; align-items:center }

.data-table { width:100%; border-collapse:collapse }
.data-table thead th {
  font-size:10px; font-weight:600; letter-spacing:1px; text-transform:uppercase;
  color:var(--t4); padding:9px 18px; text-align:left;
  border-bottom:1px solid var(--br-s); background:rgba(255,255,255,0.01);
  white-space:nowrap;
}
.data-table tbody td {
  padding:12px 18px; font-size:12px; color:var(--t3);
  border-bottom:1px solid rgba(255,255,255,0.03);
}
.data-table tbody tr:last-child td { border-bottom:none }
.data-table tbody tr:hover td { background:rgba(201,168,76,0.03); color:var(--t2) }
.td-primary { color:var(--t2) !important; font-weight:500 }
.td-mono { font-family:'Inter',sans-serif !important; font-size:11px !important }

/* ══════════════════════════════════════════
   BADGES
══════════════════════════════════════════ */
.badge {
  display:inline-flex; align-items:center; gap:4px;
  padding:2px 9px; border-radius:20px;
  font-size:10px; font-weight:700; font-family:'Inter',sans-serif; letter-spacing:.2px;
}
.badge-active { background:var(--green-bg); color:var(--green); border:1px solid rgba(61,184,116,0.2) }
.badge-pending { background:rgba(201,168,76,0.1); color:var(--gold); border:1px solid var(--br-s) }
.badge-rejected { background:var(--red-bg); color:var(--red); border:1px solid rgba(224,80,80,0.2) }
.badge-admin { background:rgba(201,168,76,0.12); color:var(--gold-l); border:1px solid var(--br) }
.badge-blue { background:var(--blue-bg); color:var(--blue); border:1px solid rgba(78,144,214,0.2) }
.badge-sim { background:rgba(255,255,255,0.05); color:var(--t3); border:1px solid var(--br-s) }

/* ══════════════════════════════════════════
   API / SETTINGS CARDS
══════════════════════════════════════════ */
.panel-card {
  background:var(--bg-2); border:1px solid var(--br-s);
  border-radius:var(--r-l); padding:20px; margin-bottom:14px;
}
.panel-card-header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:18px; gap:12px }
.panel-card-title { font-size:14px; font-weight:500; color:var(--t1); margin-bottom:3px }
.panel-card-desc { font-size:12px; color:var(--t3); line-height:1.5 }

.api-field { margin-bottom:14px }
.api-field label { display:block; font-size:10px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--t4); margin-bottom:6px }
.api-input {
  width:100%; padding:10px 13px;
  background:var(--bg-3); border:1px solid var(--br-s); border-radius:var(--r-s);
  color:var(--t1); font-size:12px; font-family:'Inter',sans-serif;
  transition:border-color .2s,box-shadow .2s;
}
.api-input:focus { border-color:var(--gold-d); box-shadow:0 0 0 3px rgba(201,168,76,0.07) }
.api-input::placeholder { color:var(--t4); font-family:'DM Sans',sans-serif; font-size:12px }
.api-input[readonly] { color:var(--t4); cursor:default }
.api-actions { display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-top:4px }
.api-status-row { display:flex; align-items:center; gap:6px; font-size:11px; color:var(--t3) }
.api-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0 }
.dot-ok { background:var(--green); box-shadow:0 0 6px rgba(61,184,116,.5) }
.dot-warn { background:var(--amber); animation:blink 1.5s infinite }
.dot-err { background:var(--red) }
.dot-idle { background:var(--t4) }

/* Settings rows */
.settings-section {
  background:var(--bg-2); border:1px solid var(--br-s); border-radius:var(--r-l); overflow:hidden; margin-bottom:12px;
}
.settings-header {
  padding:12px 18px; border-bottom:1px solid var(--br-s);
  font-size:11px; font-weight:700; letter-spacing:.5px; color:var(--t3);
  background:rgba(255,255,255,0.01);
}
.settings-row {
  display:flex; align-items:center; justify-content:space-between;
  padding:13px 18px; border-bottom:1px solid rgba(255,255,255,0.03);
}
.settings-row:last-child { border-bottom:none }
.settings-row-left { flex:1; margin-right:16px }
.settings-row-label { font-size:13px; color:var(--t2); margin-bottom:1px }
.settings-row-sub { font-size:11px; color:var(--t4) }

/* Toggle */
.toggle { position:relative; width:36px; height:19px; flex-shrink:0 }
.toggle input { opacity:0; width:0; height:0; position:absolute }
.toggle-track {
  position:absolute; inset:0; background:var(--bg-5);
  border-radius:19px; cursor:pointer; transition:background .25s;
  border:1px solid var(--br-s);
}
.toggle-track::before {
  content:''; position:absolute; width:13px; height:13px; border-radius:50%;
  background:var(--t3); top:2px; left:2px;
  transition:transform .25s,background .25s;
  box-shadow:0 1px 3px rgba(0,0,0,.4);
}
.toggle input:checked + .toggle-track { background:rgba(201,168,76,.22); border-color:var(--br) }
.toggle input:checked + .toggle-track::before { transform:translateX(17px); background:var(--gold) }

/* ══════════════════════════════════════════
   ADMIN
══════════════════════════════════════════ */
.admin-stats { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:20px }
@media(max-width:600px){ .admin-stats{grid-template-columns:1fr} }
.admin-stat {
  background:var(--bg-2); border:1px solid var(--br-s); border-radius:var(--r-l);
  padding:20px; text-align:center;
}
.admin-stat-num {
  font-family:'Inter',sans-serif; font-size:40px; font-weight:700; line-height:1;
  margin-bottom:4px;
}
.num-gold { color:var(--gold) }
.num-green { color:var(--green) }
.num-white { color:var(--t1) }
.num-red { color:var(--red) }
.admin-stat-label { font-size:11px; color:var(--t4); text-transform:uppercase; letter-spacing:.8px }

.act-btn {
  padding:4px 11px; border-radius:var(--r-s);
  font-size:10px; font-weight:700; font-family:'Inter',sans-serif;
  letter-spacing:.2px; transition:all .15s; cursor:pointer;
  display:inline-flex; align-items:center; gap:4px;
}
.act-approve { background:var(--green-bg); color:var(--green); border:1px solid rgba(61,184,116,.2) }
.act-approve:hover { background:rgba(61,184,116,.2) }
.act-reject { background:var(--red-bg); color:var(--red); border:1px solid rgba(224,80,80,.18) }
.act-reject:hover { background:rgba(224,80,80,.18) }
.act-delete { background:rgba(255,255,255,.04); color:var(--t4); border:1px solid var(--br-s) }
.act-delete:hover { color:var(--red); border-color:rgba(224,80,80,.3) }

/* ══════════════════════════════════════════
   TOAST
══════════════════════════════════════════ */
#toast-root {
  position:fixed; bottom:20px; right:20px; z-index:10000;
  display:flex; flex-direction:column; gap:8px;
}
@media(max-width:480px){ #toast-root{left:12px;right:12px;bottom:12px} }
.toast-item {
  display:flex; align-items:flex-start; gap:10px;
  padding:12px 16px; border-radius:var(--r-m);
  background:var(--bg-4); border:1px solid var(--br);
  min-width:280px; max-width:380px;
  font-size:12px; color:var(--t2);
  box-shadow:0 8px 32px rgba(0,0,0,.5);
  animation:toast-in .3s cubic-bezier(.4,0,.2,1);
}
@media(max-width:480px){ .toast-item{min-width:0;width:100%;max-width:none} }
.toast-item.out { animation:toast-out .25s forwards }
.toast-icon { flex-shrink:0; color:var(--t3) }
.toast-msg { flex:1; line-height:1.4 }
.t-success { border-color:rgba(61,184,116,.3) }
.t-success .toast-icon { color:var(--green) }
.t-error { border-color:rgba(224,80,80,.3) }
.t-error .toast-icon { color:var(--red) }
.t-gold { border-color:var(--br-m) }
.t-gold .toast-icon { color:var(--gold) }
@keyframes toast-in { from{opacity:0;transform:translateX(12px)} to{opacity:1;transform:none} }
@keyframes toast-out { to{opacity:0;transform:translateX(12px)} }

/* ══════════════════════════════════════════
   MODAL
══════════════════════════════════════════ */
.modal-overlay {
  position:fixed; inset:0; z-index:9000;
  background:rgba(0,0,0,.75); backdrop-filter:blur(4px);
  display:flex; align-items:center; justify-content:center; padding:20px;
  animation:fade-in .2s;
}
@keyframes fade-in { from{opacity:0} to{opacity:1} }
.modal-box {
  background:var(--bg-3); border:1px solid var(--br);
  border-radius:var(--r-xl); padding:28px; width:100%; max-width:460px;
  box-shadow:0 24px 80px rgba(0,0,0,.6);
  animation:modal-in .25s cubic-bezier(.4,0,.2,1);
}
@media(max-width:480px){ .modal-box{padding:22px 18px} }
@keyframes modal-in { from{opacity:0;transform:scale(.96)} to{opacity:1;transform:scale(1)} }
.modal-header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:20px }
.modal-title { font-family:'Fraunces',serif; font-size:22px; font-weight:300; color:var(--t1) }
.modal-close {
  width:28px; height:28px; display:flex; align-items:center; justify-content:center;
  background:rgba(255,255,255,.05); border:1px solid var(--br-s); border-radius:var(--r-s);
  color:var(--t3); cursor:pointer; transition:all .2s; flex-shrink:0;
}
.modal-close:hover { color:var(--t1); background:rgba(255,255,255,.1) }
.modal-footer { margin-top:20px; display:flex; gap:8px; justify-content:flex-end }

/* ══════════════════════════════════════════
   POPUP — Good Metrics Alert
══════════════════════════════════════════ */
.metrics-popup {
  position:fixed; top:80px; right:24px; z-index:8000;
  width:320px; background:var(--bg-2);
  border:1px solid var(--br-m); border-radius:var(--r-xl);
  padding:22px; box-shadow:0 16px 56px rgba(0,0,0,.6),0 0 0 1px var(--br-s);
  animation:popup-in .4s cubic-bezier(.34,1.56,.64,1);
}
@media(max-width:480px){ .metrics-popup{right:12px;left:12px;width:auto} }
@keyframes popup-in { from{opacity:0;transform:translateY(-12px) scale(.95)} to{opacity:1;transform:none;scale:1} }
.popup-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px }
.popup-title { font-size:13px; font-weight:600; color:var(--t1) }
.popup-close { background:none; border:none; color:var(--t3); cursor:pointer; padding:2px }
.popup-close:hover { color:var(--t1) }
.popup-metrics { display:grid; grid-template-columns:1fr 1fr; gap:8px }
.popup-metric {
  padding:10px 12px; background:rgba(255,255,255,.03);
  border:1px solid var(--br-s); border-radius:var(--r-m);
}
.popup-metric-label { font-size:9px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--t4); margin-bottom:3px }
.popup-metric-val { font-family:'Inter',sans-serif; font-size:18px; font-weight:700; color:var(--gold) }
.popup-footer { margin-top:12px; font-size:11px; color:var(--t3) }

/* ══════════════════════════════════════════
   RESPONSIVE REFINEMENTS
══════════════════════════════════════════ */
@media(max-width:1200px){
  .metrics-grid { grid-template-columns:repeat(3,1fr) }
}
@media(max-width:900px){
  .auth-headline { font-size:36px }
}
@media(max-width:768px){
  .metrics-grid { grid-template-columns:repeat(2,1fr) }
  .charts-row { grid-template-columns:1fr }
  .admin-stats { grid-template-columns:repeat(2,1fr) }
  .topbar { padding:0 14px }
  .topbar-section,.topbar-sep { display:none }
}
@media(max-width:480px){
  .metrics-grid { grid-template-columns:1fr 1fr; gap:8px }
  .metric-value { font-size:22px }
  .content-pad { padding:12px }
  .auth-kpis { grid-template-columns:1fr }
  .form-grid-2 { grid-template-columns:1fr }
}

/* Print */
@media print {
  .sidebar,.topbar,.sync-btn,.btn-ghost,.page-actions { display:none !important }
  .main-area { width:100% }
  .content-scroll { overflow:visible }
}

/* ── MOBILE AUTH FIX ── */
@media(max-width:860px){
  .auth-scene{grid-template-columns:1fr;min-height:100vh}
  .auth-left{min-height:100vh;justify-content:flex-start;padding-bottom:60px}
  #auth-right-panel{display:none}
  .auth-hero{flex:1}
  .auth-kpis{grid-template-columns:repeat(3,1fr)}
}
@media(max-width:480px){
  .auth-headline{font-size:32px}
  .auth-kpis{grid-template-columns:repeat(3,1fr);gap:10px}
  .auth-kpi-val{font-size:18px}
}

/* ── MODAL ANIMATION ── */
@keyframes modal-in{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
</style>
</head>

<div id="app"></div>
<script>
/* ═══════════════════════════════════════════════

/* ── AUTH ── */
const Auth = {
  async login(email, password) {
    const { data, error } = await getSB().auth.signInWithPassword({ email, password });
    if (error) {
      if (error.message.includes('Invalid login')) throw new Error('E-mail ou senha incorretos');
      if (error.message.includes('Email not confirmed')) throw new Error('Confirme seu e-mail antes de entrar');
      throw new Error(error.message);
    }
    const { data: profile, error: pe } = await getSB()
      .from('profiles').select('*').eq('id', data.user.id).single();
    if (pe || !profile) throw new Error('Perfil não encontrado. Contate o suporte.');
    if (profile.status === 'rejected') throw new Error('Acesso negado. Contate o suporte.');
    return { ...data.user, ...profile, id: profile.id };
  },

  async register({ name, email, company, whatsapp, password }) {
    const { data, error } = await getSB().auth.signUp({
      email, password,
      options: { data: { name, company, whatsapp } }
    });
    if (error) {
      if (error.message.includes('already registered')) throw new Error('E-mail já cadastrado');
      throw new Error(error.message);
    }
    // Trigger no banco cria o perfil automaticamente (handle_new_user)
    // Mas garantimos aqui caso o trigger falhe
    if (data.user) {
      const initials = name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
      await getSB().from('profiles').upsert({
        id: data.user.id, name, email, company, whatsapp,
        role: 'client', status: 'pending', plan: 'starter',
        avatar_initials: initials,
        created_at: new Date().toISOString(),
        updated_at: new Date().toISOString()
      }, { onConflict: 'id', ignoreDuplicates: true });
    }
    return data.user;
  },

  async currentUser() {
    try {
      const { data: { session } } = await getSB().auth.getSession();
      if (!session) return null;
      const { data: profile } = await getSB()
        .from('profiles').select('*').eq('id', session.user.id).single();
      return profile ? { ...session.user, ...profile, id: profile.id } : null;
    } catch { return null; }
  },

  async logout() { await getSB().auth.signOut(); },

  async updateUser(userId, changes) {
    const { data, error } = await getSB()
      .from('profiles')
      .update({ ...changes, updated_at: new Date().toISOString() })
      .eq('id', userId).select().single();
    if (error) throw new Error(error.message);
    return data;
  }
};
window.Auth = Auth;

/* ── DATA LAYER ── */
const DataLayer = {
  async getMetrics(userId, days = 30) {
    const since = new Date(Date.now() - days * 86400000).toISOString().split('T')[0];
    const { data } = await getSB().from('metrics').select('*')
      .eq('user_id', userId).gte('date', since).order('date', { ascending: false });
    const rows = data || [];
    if (!rows.length) return { spend:0, clicks:0, impressions:0, cpc:0, ctr:0, leads:0, sales:0, revenue:0, roas:0, rows:[] };
    const T = rows.reduce((a,r)=>({
      spend:a.spend+(+r.spend||0), clicks:a.clicks+(+r.clicks||0),
      impressions:a.impressions+(+r.impressions||0), leads:a.leads+(+r.leads||0),
      sales:a.sales+(+r.sales||0), revenue:a.revenue+(+r.revenue||0)
    }), {spend:0,clicks:0,impressions:0,leads:0,sales:0,revenue:0});
    T.cpc  = T.clicks?+(T.spend/T.clicks).toFixed(2):0;
    T.ctr  = T.impressions?+((T.clicks/T.impressions)*100).toFixed(2):0;
    T.roas = T.spend?+(T.revenue/T.spend).toFixed(2):0;
    T.rows = rows;
    return T;
  },

  async saveMetric(row) {
    await getSB().from('metrics').insert(row);
  },

  async getLeads(userId) {
    const { data } = await getSB().from('leads').select('*')
      .eq('user_id', userId).order('created_at', { ascending: false });
    return data || [];
  },

  async getAllClients() {
    const { data } = await getSB().from('profiles').select('*')
      .eq('role', 'client').order('created_at', { ascending: false });
    return data || [];
  },

  async setClientStatus(userId, status) {
    await getSB().from('profiles')
      .update({ status, updated_at: new Date().toISOString() }).eq('id', userId);
  },

  async updateClient(userId, changes) {
    await getSB().from('profiles')
      .update({ ...changes, updated_at: new Date().toISOString() }).eq('id', userId);
  },

  async getLogs() {
    const { data } = await getSB().from('logs').select('*')
      .order('created_at', { ascending: false }).limit(50);
    return data || [];
  },

  async addLog(action, detail, userId = null) {
    try {
      await getSB().from('logs').insert({ action, detail, user_id: userId, created_at: new Date().toISOString() });
    } catch {}
  },

  async getNotifications() {
    const { data } = await getSB().from('notifications').select('*')
      .order('created_at', { ascending: false }).limit(20);
    return data || [];
  },

  async addNotification(title, body) {
    await getSB().from('notifications').insert({ title, body, created_at: new Date().toISOString() });
  },

  async addSatisfaction(userId, score) {
    await getSB().from('satisfaction').insert({ user_id: userId, score, created_at: new Date().toISOString() });
  },

  async getGlobalBMToken() {
    const { data } = await getSB().from('app_config').select('value').eq('key','bm_token').single();
    return data?.value || '';
  },

  async saveGlobalBMToken(token) {
    await getSB().from('app_config').upsert({ key:'bm_token', value: token, updated_at: new Date().toISOString() });
  }
};
window.DataLayer = DataLayer;

/* ── META ADS ── */
const MetaAds = (() => {
  const API  = 'https://graph.facebook.com/v19.0';
  const FLDS = 'spend,clicks,impressions,cpc,ctr,date_start,date_stop';
  const PROXIES = [
    u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
    u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`
  ];
  let _timer=null, _lastSync=null, _syncing=false, _onSync=null;

  function getActId(userId) {
    try { return JSON.parse(localStorage.getItem('co_cli_'+userId)||'{}').actId||''; } catch{return '';}
  }
  function setActId(userId, actId, datePreset='last_30d') {
    localStorage.setItem('co_cli_'+userId, JSON.stringify({actId, datePreset}));
  }
  function getClientConfig(uid) {
    try { return JSON.parse(localStorage.getItem('co_cli_'+uid)||'{}'); } catch{return {};}
  }
  function saveClientConfig(uid,cfg) { localStorage.setItem('co_cli_'+uid,JSON.stringify(cfg)); }

  async function safeFetch(url) {
    try { const r=await fetch(url); if(r.ok||r.status===400)return r; } catch{}
    for(const proxy of PROXIES) {
      try { const r=await fetch(proxy(url)); if(r.ok||r.status===400)return r; } catch{}
    }
    throw new Error('Não foi possível conectar à Meta API');
  }

  async function fetchInsights(actId, token, datePreset='last_30d') {
    if(!actId||!token) throw new Error('act_ID ou token não configurado');
    const acc = actId.startsWith('act_')?actId:'act_'+actId;
    const url = `${API}/${acc}/insights?fields=${FLDS}&date_preset=${datePreset}&level=account&access_token=${token}`;
    const resp = await safeFetch(url);
    const json = await resp.json();
    if(json.error) throw new Error(`Meta ${json.error.code}: ${json.error.message}`);
    return json.data||[];
  }

  async function validateToken(token) {
    if(!token||!token.startsWith('EAA')) return {ok:false,error:'Token deve começar com EAA'};
    try {
      const resp = await safeFetch(`${API}/me?fields=id,name&access_token=${token}`);
      const j = await resp.json();
      if(j.error) return {ok:false,error:j.error.message};
      return {ok:true, name:j.name, id:j.id};
    } catch(e) { return {ok:false,error:e.message}; }
  }

  async function testConnection(actId, token) {
    const tv = await validateToken(token);
    if(!tv.ok) return {ok:false, step:'token', error:tv.error};
    try {
      const acc = actId.startsWith('act_')?actId:'act_'+actId;
      const resp = await safeFetch(`${API}/${acc}?fields=id,name,account_status&access_token=${token}`);
      const j = await resp.json();
      if(j.error) return {ok:false, step:'conta', error:j.error.message, tokenUser:tv.name};
      const data = await fetchInsights(actId, token, 'last_30d');
      return {ok:true, tokenUser:tv.name, accountName:j.name, hasData:data.length>0, data};
    } catch(e) { return {ok:false, step:'insights', error:e.message, tokenUser:tv.name}; }
  }

  function simulate(base={}) {
    const v=(val,p)=>val*(1+(Math.random()-.5)*p);
    return {
      spend:+v(base.spend||0,.08).toFixed(2),
      clicks:Math.round(v(base.clicks||0,.1)),
      impressions:Math.round(v(base.impressions||0,.12)),
      cpc:+v(base.cpc||0,.06).toFixed(2),
      ctr:+v(base.ctr||0,.07).toFixed(2),
      simulated:true
    };
  }

  function mapToMetrics(d, uid) {
    const spend=parseFloat(d.spend)||0, clicks=parseInt(d.clicks)||0, imp=parseInt(d.impressions)||0;
    const leads=Math.round(clicks*.042), sales=Math.round(leads*.254), rev=+(sales*496.5).toFixed(2);
    return {
      user_id:uid, date:new Date().toISOString().split('T')[0],
      spend, clicks, impressions:imp,
      cpc:parseFloat(d.cpc)||(clicks?+(spend/clicks).toFixed(2):0),
      ctr:parseFloat(d.ctr)||(imp?+((clicks/imp)*100).toFixed(2):0),
      leads, sales, revenue:rev,
      roas:spend?+(rev/spend).toFixed(2):0,
      source:d.simulated?'simulated':'meta_api',
      synced_at:new Date().toISOString()
    };
  }

  async function sync(uid) {
    if(_syncing) return null;
    _syncing=true;
    try {
      const token = await DataLayer.getGlobalBMToken();
      const cfg   = getClientConfig(uid);
      const actId = cfg.actId||'';
      let raw, isReal=false;

      if(token && actId) {
        try {
          const data = await fetchInsights(actId, token, cfg.datePreset||'last_30d');
          if(data.length>0) { raw=data[0]; isReal=true; }
          else { raw=simulate({}); }
        } catch(err) {
          console.warn('[MetaAds]', err.message);
          raw=simulate({});
        }
      } else {
        raw=simulate({});
      }

      const m = mapToMetrics(raw, uid);
      await DataLayer.saveMetric(m);
      _lastSync=new Date();
      if(_onSync) _onSync(m, isReal);
      return {metrics:m, isReal};
    } finally { _syncing=false; }
  }

  function startAutoSync(uid,cb) {
    stopAutoSync(); if(cb)_onSync=cb;
    _timer=setInterval(()=>sync(uid), 10*60*1000);
  }
  function stopAutoSync() { if(_timer){clearInterval(_timer);_timer=null;} }

  function buildEndpoint(actId) {
    const acc=actId?(actId.startsWith('act_')?actId:'act_'+actId):'act_{ID}';
    return `${API}/${acc}/insights?fields=${FLDS}&date_preset=last_30d`;
  }

  return {
    sync, startAutoSync, stopAutoSync,
    validateToken, testConnection,
    getClientConfig, saveClientConfig, getActId, setActId,
    buildEndpoint,
    getLastSync:()=>_lastSync, isSyncing:()=>_syncing,
    FIELDS:FLDS, API_BASE:API
  };
})();
window.MetaAds = MetaAds;

const Charts = (() => {
  const GOLD='#C9A84C', GREEN='#3DB874', BLUE='#4E90D6', MUTED='#8A7F6A';
  const _i={};
  const BASE={family:"'DM Sans',sans-serif",size:11};
  const GRID={color:'rgba(201,168,76,0.06)'};
  const TICK={color:MUTED,font:{...BASE,size:10}};
  const TT={backgroundColor:'#1A1A1A',borderColor:'rgba(201,168,76,0.3)',borderWidth:1,titleColor:'#F5F0E8',bodyColor:'#C4B896',padding:10};

  function destroy(id){if(_i[id]){_i[id].destroy();delete _i[id];}}
  function ctx(id){const w=document.getElementById(id);if(!w)return null;w.innerHTML='<canvas style="display:block"></canvas>';return w.querySelector('canvas').getContext('2d');}

  function line(id,{labels,datasets,aspectRatio=3,yPrefix=''}){
    destroy(id); const c=ctx(id); if(!c||!window.Chart)return;
    const pal=[GOLD,BLUE,GREEN];
    _i[id]=new window.Chart(c,{type:'line',data:{labels,datasets:datasets.map((d,i)=>({
      label:d.label,data:d.data,borderColor:d.color||pal[i%3],
      backgroundColor:(ctx2)=>{const ch=ctx2.chart,ca=ch.chartArea;if(!ca)return'rgba(0,0,0,0)';const g=ch.ctx.createLinearGradient(0,ca.top,0,ca.bottom);g.addColorStop(0,(d.color||pal[i%3])+'35');g.addColorStop(1,'rgba(8,8,8,0)');return g;},
      fill:true,tension:.4,borderWidth:2,pointBackgroundColor:d.color||pal[i%3],pointBorderColor:'#0E0E0E',pointBorderWidth:2,pointRadius:3,pointHoverRadius:5
    }))},options:{responsive:true,maintainAspectRatio:true,aspectRatio,interaction:{mode:'index',intersect:false},
      plugins:{legend:{display:datasets.length>1,labels:{color:MUTED,font:BASE,boxWidth:8,usePointStyle:true}},tooltip:{...TT}},
      scales:{x:{grid:{...GRID,display:false},ticks:TICK},y:{grid:GRID,ticks:{...TICK,callback:v=>yPrefix+v}}}}});
  }

  function bar(id,{labels,datasets,aspectRatio=3,yPrefix=''}){
    destroy(id); const c=ctx(id); if(!c||!window.Chart)return;
    const pal=[GOLD,BLUE,GREEN];
    _i[id]=new window.Chart(c,{type:'bar',data:{labels,datasets:datasets.map((d,i)=>({label:d.label,data:d.data,backgroundColor:d.color||pal[i%3],borderRadius:4,borderSkipped:'bottom'}))},
      options:{responsive:true,maintainAspectRatio:true,aspectRatio,plugins:{legend:{display:datasets.length>1,labels:{color:MUTED,font:BASE,boxWidth:8}},tooltip:{...TT}},
      scales:{x:{grid:{...GRID,display:false},ticks:TICK},y:{grid:GRID,ticks:{...TICK,callback:v=>yPrefix+v}}}}});
  }

  function doughnut(id,{labels,data,colors:clrs}){
    destroy(id); const c=ctx(id); if(!c||!window.Chart)return;
    _i[id]=new window.Chart(c,{type:'doughnut',data:{labels,datasets:[{data,backgroundColor:clrs||[GOLD,BLUE,GREEN,'#3A3A3A'],borderColor:'#0E0E0E',borderWidth:3,hoverOffset:6}]},
      options:{responsive:true,cutout:'72%',plugins:{legend:{position:'right',labels:{color:MUTED,font:BASE,boxWidth:8,usePointStyle:true,padding:12}},tooltip:{...TT}}}});
  }

  function destroyAll(){Object.keys(_i).forEach(id=>destroy(id));}
  return {line,bar,doughnut,destroyAll};
})();

/* ── TOAST + MODAL ── */
const Toast = (() => {
  let root;
  const icons={success:Icon.check,error:Icon.x,info:Icon.info,gold:Icon.award};
  function init(){if(document.getElementById('toast-root'))return;root=document.createElement('div');root.id='toast-root';document.body.appendChild(root);}
  function show(msg,type='info',dur=3800){
    init();
    const el=document.createElement('div');
    el.className=`toast-item t-${type}`;
    el.innerHTML=`<span class="toast-icon">${icons[type]||icons.info}</span><span class="toast-msg">${msg}</span>`;
    root.appendChild(el);
    setTimeout(()=>{el.classList.add('out');setTimeout(()=>el.remove(),260);},dur);
  }
  return {success:(m,d)=>show(m,'success',d),error:(m,d)=>show(m,'error',d),info:(m,d)=>show(m,'info',d),gold:(m,d)=>show(m,'gold',d)};
})();
window.Toast=Toast;

const Modal=(() => {
  let ov=null;
  function open({title='',body='',footer='',onClose}={}){
    close();
    ov=document.createElement('div');
    ov.className='modal-overlay';
    ov.innerHTML=`<div class="modal-box"><div class="modal-header"><h3 class="modal-title">${title}</h3><button class="modal-close" id="mc-x">${Icon.x}</button></div><div class="modal-body">${body}</div>${footer?`<div class="modal-footer">${footer}</div>`:''}</div>`;
    document.body.appendChild(ov);
    document.getElementById('mc-x').onclick=()=>{close();if(onClose)onClose();};
    ov.onclick=e=>{if(e.target===ov){close();if(onClose)onClose();}};
  }
  function close(){if(ov){ov.remove();ov=null;}}
  function confirm({title='',message='',confirmText='Confirmar',cancelText='Cancelar'}={}){
    return new Promise(res=>{
      open({title,body:`<p style="font-size:13px;color:var(--t3);line-height:1.6">${message}</p>`,
        footer:`<button class="btn-ghost" id="m-cancel">${cancelText}</button><button class="btn-gold compact" id="m-ok">${confirmText}</button>`,
        onClose:()=>res(false)});
      document.getElementById('m-cancel').onclick=()=>{close();res(false);};
      document.getElementById('m-ok').onclick=()=>{close();res(true);};
    });
  }
  return {open,close,confirm};
})();
window.Modal=Modal;

const Notifications = (() => {
  let _items=[], _unread=0, _uid=null;
  async function load(userId) {
    _uid=userId;
    const key='co_notif_seen_'+userId;
    const seen=parseInt(localStorage.getItem(key)||'0');
    const msgs = await DataLayer.getNotifications();
    _items=msgs;
    _unread=msgs.filter(m=>new Date(m.created_at).getTime()>seen).length;
    return _unread;
  }
  function markSeen(){
    if(_uid) localStorage.setItem('co_notif_seen_'+_uid, Date.now().toString());
    _unread=0;
  }
  function openPanel(){
    Modal.open({
      title:'Notificações',
      body:_items.length?_items.map(n=>`
        <div style="padding:10px 0;border-bottom:1px solid var(--br-s)">
          <div style="font-size:12px;font-weight:500;color:var(--t1);margin-bottom:2px">${n.title}</div>

        `<p style="font-size:13px;color:var(--t4);text-align:center;padding:20px">Nenhuma notificação</p>`,
      footer:`<button class="btn-ghost" onclick="Modal.close()">Fechar</button>`
    });
    markSeen();
  }
  return {load,openPanel,get unread(){return _unread;}};
})();

async function _loginWith(suffix) {
  const email = document.getElementById('login-email-'+suffix)?.value?.trim();
  const pass  = document.getElementById('login-pass-'+suffix)?.value;
  const alertEl = document.getElementById('login-alert-'+suffix);
  if (alertEl) alertEl.innerHTML='';
  if (!email||!pass) { if(alertEl)alertEl.innerHTML=`<div class="alert alert-error">Preencha e-mail e senha</div>`; return; }
  const btn = document.getElementById('btn-login-'+suffix);
  if(btn){btn.disabled=true;btn.textContent='Verificando...';}
  try {
    const user = await Auth.login(email, pass);
    closeLoginModal();
    Toast.success(`Bem-vindo, ${user.name}!`);
    setTimeout(()=>App.routeUser(user), 300);
  } catch(err) {
    if(alertEl)alertEl.innerHTML=`<div class="alert alert-error">${err.message}</div>`;
    if(btn){btn.disabled=false;btn.textContent='Acessar painel';}
  }
}

async function _doRegister() {
  const data = {
    name:     document.getElementById('reg-name')?.value?.trim(),
    email:    document.getElementById('reg-email')?.value?.trim(),
    company:  document.getElementById('reg-company')?.value?.trim(),
    whatsapp: document.getElementById('reg-whatsapp')?.value?.trim(),
    password: document.getElementById('reg-pass')?.value
  };
  const alertEl = document.getElementById('reg-alert-m');
  if(alertEl)alertEl.innerHTML='';
  if(!data.name||!data.email||!data.company||!data.whatsapp||!data.password){
    if(alertEl)alertEl.innerHTML=`<div class="alert alert-error">Preencha todos os campos</div>`;return;
  }
  if(data.password.length<6){if(alertEl)alertEl.innerHTML=`<div class="alert alert-error">Senha mínima: 6 caracteres</div>`;return;}
  const btn=document.getElementById('btn-reg');
  if(btn){btn.disabled=true;btn.textContent='Enviando...';}
  try {
    await Auth.register(data);
    closeRegModal();
    Toast.gold(`Cadastro recebido, ${data.name}! Aguarde aprovação.`);
    setTimeout(()=>App.navigate('pending',{name:data.name,company:data.company}),400);
  } catch(err) {
    if(alertEl)alertEl.innerHTML=`<div class="alert alert-error">${err.message}</div>`;
    if(btn){btn.disabled=false;btn.textContent='Enviar solicitação';}
  }
}

function initAuthAnimations() {
  const panel=document.getElementById('auth-left-panel'), glow=document.getElementById('cursor-glow');
  if(panel&&glow){panel.addEventListener('mousemove',e=>{const r=panel.getBoundingClientRect();glow.style.left=(e.clientX-r.left)+'px';glow.style.top=(e.clientY-r.top)+'px';});}
  const pc=document.getElementById('particles');
  if(pc){
    const spawn=()=>{const p=document.createElement('div');p.className='particle';const sz=2+Math.random()*4;p.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;animation-duration:${6+Math.random()*8}s;animation-delay:${Math.random()*4}s;opacity:0`;pc.appendChild(p);setTimeout(()=>p.remove(),16000);};
    spawn();setInterval(spawn,1200);
  }
  // Close modals clicking outside
  ['popup-login','popup-reg'].forEach(id=>{
    document.getElementById(id)?.addEventListener('click',e=>{if(e.target.id===id)e.target.style.display='none';});
  });
  // Enter keys
  document.getElementById('login-pass-d')?.addEventListener('keydown',e=>{if(e.key==='Enter')_loginWith('d');});
  document.getElementById('login-pass-m')?.addEventListener('keydown',e=>{if(e.key==='Enter')_loginWith('m');});
  document.getElementById('reg-pass')?.addEventListener('keydown',e=>{if(e.key==='Enter')_doRegister();});
}

let _cu=null, _cm=null, _leads=[];

async function loadClientDash(user) {
  _cu=user;

  // Carrega act_ID do perfil
  if(user.meta_account_id && user.meta_account_id.startsWith('act_')) {
    MetaAds.saveClientConfig(user.id,{actId:user.meta_account_id,datePreset:'last_30d'});
  }

  // Sync métricas
  await MetaAds.sync(user.id);
  _cm = await DataLayer.getMetrics(user.id);

  // Notificações
  const unread = await Notifications.load(user.id);

  renderMetricCards();
  await renderOverviewCharts();
  renderHistoryTable();
  _leads = await DataLayer.getLeads(user.id);
  renderLeadsTable(_leads);
  updateSyncLabel();
  updateNotifBadge(unread);
  checkGoodMetrics();
  checkSatisfactionPopup();

  MetaAds.startAutoSync(user.id, async(_m, isReal)=>{
    _cm = await DataLayer.getMetrics(user.id);
    renderMetricCards();
    await renderOverviewCharts();
    renderHistoryTable();
    updateSyncLabel();
    Toast.gold(isReal?'Dados atualizados com dados reais':'Métricas atualizadas');
  });
  setInterval(updateSyncLabel,30000);
}

function updateSyncLabel(){const el=document.getElementById('sync-label');if(!el)return;const t=MetaAds.getLastSync();el.textContent=t?`Atualizado ${fmt.ago(t)}`:'Sincronizando...';}
function updateNotifBadge(n){const b=document.getElementById('notif-badge');if(!b)return;const count=n??Notifications.unread;b.textContent=count;b.style.display=count>0?'flex':'none';}

function checkGoodMetrics(){
  if(!_cm||(!_cm.roas&&!_cm.ctr))return;
  if(_cm.roas>=3||_cm.ctr>=4) setTimeout(()=>{
    if(document.getElementById('good-metrics-popup'))return;
    const el=document.createElement('div');el.id='good-metrics-popup';el.className='metrics-popup';
    el.innerHTML=`<div class="popup-header"><span class="popup-title">${Icon.award} Ótimos resultados!</span><button class="popup-close" onclick="document.getElementById('good-metrics-popup').remove()">${Icon.x}</button></div>
    <div class="popup-metrics">
      <div class="popup-metric"><div class="popup-metric-label">Retorno</div><div class="popup-metric-val">${(_cm.roas||0).toFixed(2)}×</div></div>
      <div class="popup-metric"><div class="popup-metric-label">Taxa clique</div><div class="popup-metric-val">${(_cm.ctr||0).toFixed(2)}%</div></div>
      <div class="popup-metric"><div class="popup-metric-label">Alcance</div><div class="popup-metric-val">${fmt.big(_cm.impressions)}</div></div>
      <div class="popup-metric"><div class="popup-metric-label">Investimento</div><div class="popup-metric-val">${fmt.currency(_cm.spend)}</div></div>
    </div>
    <p class="popup-footer">Seu dinheiro está sendo bem investido!</p>`;
    document.body.appendChild(el);setTimeout(()=>el?.parentNode&&el.remove(),10000);
  },1500);
}

function checkSatisfactionPopup(){
  if(!_cu)return;
  const key='co_sat_'+_cu.id, last=parseInt(localStorage.getItem(key)||'0');
  if(Date.now()-last<7*24*60*60*1000)return;
  setTimeout(()=>{
    if(document.getElementById('sat-popup'))return;
    const el=document.createElement('div');el.id='sat-popup';el.className='metrics-popup';
    el.style.cssText='right:24px;bottom:24px;width:300px';
    el.innerHTML=`<div class="popup-header"><span class="popup-title">Como foi essa semana?</span><button class="popup-close" onclick="document.getElementById('sat-popup').remove()">${Icon.x}</button></div>
    <p style="font-size:12px;color:var(--t2);margin-bottom:14px;line-height:1.5">Como avalia os resultados dos seus anúncios?</p>
    <div style="display:flex;gap:8px;justify-content:center;margin-bottom:10px">
      ${[1,2,3,4,5].map(n=>`<button onclick="rateSatisfaction(${n})" style="width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.05);border:1px solid var(--br-s);color:var(--gold);font-size:17px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif">${n}</button>`).join('')}
    </div>
    <p style="font-size:10px;color:var(--t4);text-align:center">1 = Ruim · 5 = Excelente</p>`;
    document.body.appendChild(el);
  },6000);
}

async function rateSatisfaction(score){
  localStorage.setItem('co_sat_'+_cu?.id,Date.now().toString());
  await DataLayer.addSatisfaction(_cu?.id,score);
  document.getElementById('sat-popup')?.remove();
  Toast.success(`Obrigado! Nota ${score}/5 registrada.`);
}

function renderMetricCards(){
  const el=document.getElementById('metrics-grid');if(!el||!_cm)return;
  const cards=[
    {l:'Investimento em anúncios',  v:fmt.currency(_cm.spend),              sub:'Total investido',        icon:Icon.dollar,       d:_cm.spend>0?'Ativo':'R$0',    up:true},
    {l:'Cliques recebidos',         v:fmt.num(_cm.clicks),                  sub:'Pessoas que clicaram',   icon:Icon.mouse,        d:_cm.clicks>0?`${_cm.clicks}`:'0', up:true},
    {l:'Pessoas alcançadas',        v:fmt.big(_cm.impressions),             sub:'Visualizações do anúncio',icon:Icon.eye,         d:fmt.big(_cm.impressions),     up:true},
    {l:'Custo por clique (CPC)',    v:_cm.cpc>0?fmt.currency(_cm.cpc,true):'R$0,00',sub:'Preço médio de cada clique',icon:Icon.barChart,d:'CPC',up:true},
    {l:'Taxa de clique (CTR)',      v:(_cm.ctr||0).toFixed(2)+'%',          sub:'% de quem viu e clicou', icon:Icon.target,       d:(_cm.ctr||0)>=2?'Bom':'—',    up:(_cm.ctr||0)>=2},
    {l:'Leads / Mensagens',         v:fmt.num(_cm.leads),                   sub:'Contatos gerados',       icon:Icon.users,        d:_cm.leads>0?`${_cm.leads}`:'0', up:true},
    {l:'Vendas / Agendamentos',     v:fmt.num(_cm.sales),                   sub:'Conversões realizadas',  icon:Icon.shoppingCart, d:_cm.sales>0?`${_cm.sales}`:'0', up:true},
    {l:'Retorno sobre investimento', v:_cm.roas>0?(_cm.roas).toFixed(2)+'×':'0×', sub:'Para cada R$1 investido',icon:Icon.award,d:_cm.roas>=2?'Saudável':'—',up:_cm.roas>=2}
  ];
  const wk=_cm.rows?.length?_cm.rows.slice(0,7).reverse().map(r=>r.clicks||0):[0,0,0,0,0,0,0];
  const wkMax=Math.max(...wk,1);
  el.innerHTML=cards.map(c=>{
    const spark=wk.map((v,i)=>`<div class="spark-bar${i===wk.length-1?' hi':''}" style="height:${Math.max(3,Math.round(v/wkMax*18))}px"></div>`).join('');
    return `<div class="metric-card"><div class="mc-top"><span class="mc-label">${c.l}</span><div class="mc-icon">${c.icon}</div></div>
    <div class="metric-value">${c.v}</div><div class="mc-spark">${spark}</div>
    <div class="mc-footer"><span class="mc-sub">${c.sub}</span><span class="mc-delta ${c.up?'delta-up':'delta-down'}">${c.d}</span></div></div>`;
  }).join('');
}

function switchSection(s,btn){
  ['resumo','graficos'].forEach(t=>{document.getElementById('sec-'+t)?.classList.add('hidden');});
  document.getElementById('sec-'+s)?.classList.remove('hidden');
  document.querySelectorAll('.sec-tab').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  if(s==='graficos')renderOverviewCharts();
}

async function renderOverviewCharts(){
  if(!_cm?.rows?.length)return;
  const rows=[..._cm.rows].sort((a,b)=>new Date(a.date)-new Date(b.date)).slice(-14);
  const labels=rows.map(r=>fmt.date(r.date));
  Charts.line('ch-clicks',{labels,aspectRatio:3,datasets:[{label:'Cliques',data:rows.map(r=>r.clicks||0),color:'#C9A84C'},{label:'Alcance (÷100)',data:rows.map(r=>Math.round((r.impressions||0)/100)),color:'#4E90D6'}]});
  Charts.bar('ch-spend',{labels,aspectRatio:3.5,yPrefix:'R$',datasets:[{label:'Investimento (R$)',data:rows.map(r=>+(r.spend||0).toFixed(2)),color:'#3DB874'}]});
  Charts.doughnut('ch-donut',{labels:['Cliques','Leads','Vendas'],data:[_cm.clicks||1,_cm.leads||0,_cm.sales||0],colors:['#C9A84C','#3DB874','#4E90D6']});
}

function renderHistoryTable(){
  const el=document.getElementById('hist-tbody');if(!el)return;
  if(!_cm?.rows?.length){el.innerHTML=`<tr><td colspan="6" style="text-align:center;color:var(--t4);padding:24px">Sem dados — métricas aparecem quando houver anúncios ativos</td></tr>`;return;}
  el.innerHTML=[..._cm.rows].sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,14).map(r=>`
    <tr>
      <td class="td-primary td-mono">${r.date}</td>
      <td class="td-mono">${fmt.currency(r.spend)}</td>
      <td class="td-mono">${fmt.num(r.clicks)}</td>
      <td class="td-mono">${fmt.big(r.impressions)}</td>
      <td class="td-mono">${(r.ctr||0).toFixed(2)}%</td>
      <td><span class="mc-delta ${(r.roas||0)>=2?'delta-up':'delta-down'}">${(r.roas||0).toFixed(2)}×</span></td>
    </tr>`).join('');
}

function renderLeadsTable(leads){
  const el=document.getElementById('leads-tbody');if(!el)return;
  const sb={Novo:'badge-blue',Qualificado:'badge-pending','Em contato':'badge-pending',Convertido:'badge-active',Perdido:'badge-rejected'};
  el.innerHTML=leads.length?leads.map(l=>`
    <tr>
      <td class="td-primary">${l.name||'—'}</td>
      <td class="td-mono" style="font-size:11px">${l.email||'—'}</td>
      <td class="td-mono">${l.phone||'—'}</td>
      <td class="td-mono">${new Date(l.created_at).toLocaleDateString('pt-BR')}</td>
      <td><span class="badge ${sb[l.status]||'badge-pending'}">${l.status||'Novo'}</span></td>
      <td class="td-mono">${fmt.currency(l.value)}</td>
    </tr>`).join(''):
    `<tr><td colspan="6" style="text-align:center;color:var(--t4);padding:24px">Nenhum lead ainda</td></tr>`;
}

function searchLeads(q){renderLeadsTable(q?_leads.filter(l=>[l.name,l.email].some(v=>v?.toLowerCase().includes(q.toLowerCase()))):_leads);}

async function syncNow(){
  const btns=document.querySelectorAll('[data-sync]');btns.forEach(b=>{b.disabled=true;b.classList.add('spinning');});
  try {
    await MetaAds.sync(_cu.id);
    _cm=await DataLayer.getMetrics(_cu.id);
    renderMetricCards();await renderOverviewCharts();renderHistoryTable();updateSyncLabel();
    Toast.success('Dados atualizados!');
  } finally {btns.forEach(b=>{b.disabled=false;b.classList.remove('spinning');});}
}

const CLIENT_TABS=['overview','analytics','leads','reports','settings'];
function clientTab(tab,el){
  CLIENT_TABS.forEach(t=>{document.getElementById('ct-'+t)?.classList.add('hidden');});
  document.getElementById('ct-'+tab)?.classList.remove('hidden');
  document.querySelectorAll('#sb-client .sb-item').forEach(i=>i.classList.remove('active'));if(el)el.classList.add('active');
  const titles={overview:'Resumo',analytics:'Análise',leads:'Leads',reports:'Relatórios',settings:'Configurações'};
  const tt=document.getElementById('topbar-title');if(tt)tt.textContent=titles[tab]||tab;
  if(tab==='leads'){DataLayer.getLeads(_cu?.id).then(l=>{_leads=l;renderLeadsTable(l);const c=document.getElementById('leads-count');if(c)c.textContent=l.length;});}
  if(tab==='reports')renderReportsTab();
  document.getElementById('sb-client')?.classList.remove('mobile-open');
  document.getElementById('sb-overlay')?.classList.remove('visible');
}

async function refreshClients(){

  s('adm-total',total);s('adm-pending',pending);s('adm-active',active);
  const pb=document.getElementById('adm-pending-badge');

  const sl={active:'Ativo',pending:'Pendente',rejected:'Rejeitado'};
  el.innerHTML=clients.sort((a,b)=>{const o={pending:0,active:1,rejected:2};return(o[a.status]??1)-(o[b.status]??1);}).map(u=>{

        <div style="width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold-d));display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#0A0A0A;flex-shrink:0">${u.avatar_initials||'??'}</div>
        <div><div class="td-primary" style="font-size:13px">${u.name}</div><div style="font-size:10px;color:var(--t4)">${u.company||'—'}</div></div>
      </div></td>
      <td class="td-mono" style="font-size:11px">${u.email}</td>
      <td class="td-mono" style="font-size:11px">${u.whatsapp||'—'}</td>
      <td>${hasAct?`<span class="badge badge-active">${Icon.check} ${u.meta_account_id}</span>`:`<span class="badge badge-rejected">${Icon.x} Não configurado</span>`}</td>
      <td><span class="badge ${u.plan==='enterprise'?'badge-admin':u.plan==='pro'?'badge-pending':'badge-blue'}">${(u.plan||'starter').toUpperCase()}</span></td>

async function saveClientConfig(userId){
  const metaId=document.getElementById('edit-meta-id')?.value.trim();
  const whatsapp=document.getElementById('edit-whatsapp')?.value.trim();
  const plan=document.getElementById('edit-plan')?.value;
  const status=document.getElementById('edit-status')?.value;
  const actId=metaId?(metaId.startsWith('act_')?metaId:'act_'+metaId):'';
  await DataLayer.updateClient(userId,{meta_account_id:actId,whatsapp:whatsapp||'',plan:plan||'starter',status:status||'pending'});

  Modal.close();await refreshClients();
  Toast.success(`Cliente configurado! ${actId||'sem act_ID'}`);
}

async function renderAdminGlobalMetrics(){
  const el=document.getElementById('adm-metrics-grid');if(!el)return;
  const clients=await DataLayer.getAllClients();
  const active=clients.filter(u=>u.status==='active');
  let tSpend=0,tLeads=0,tClicks=0,tRevenue=0;
  for(const u of active){
    const m=await DataLayer.getMetrics(u.id,30);
    tSpend+=m.spend||0;tLeads+=m.leads||0;tClicks+=m.clicks||0;tRevenue+=m.revenue||0;
  }
  const avgRoas=tSpend>0?(tRevenue/tSpend).toFixed(2):'0.00';
  const fC=v=>v>=1e6?'R$'+(v/1e6).toFixed(2)+'M':v>=1e3?'R$'+(v/1e3).toFixed(1)+'K':'R$'+v.toFixed(2);
  const fN=v=>v>=1e6?(v/1e6).toFixed(1)+'M':v>=1e3?(v/1e3).toFixed(1)+'K':String(Math.round(v));
  el.innerHTML=[{l:'Investimento Total',v:fC(tSpend),i:Icon.dollar},{l:'Total de Leads',v:fN(tLeads),i:Icon.users},{l:'ROAS Médio',v:avgRoas+'×',i:Icon.award},{l:'Total de Cliques',v:fN(tClicks),i:Icon.mouse}]
    .map(c=>`<div class="metric-card"><div class="mc-top"><span class="mc-label">${c.l}</span><div class="mc-icon">${c.i}</div></div><div class="metric-value">${c.v}</div><div class="mc-footer"><span class="mc-sub">Todos os clientes ativos</span></div></div>`).join('');
}

function updateEndpointDisplay(actId){
  const ep=document.getElementById('endpoint-display');if(!ep)return;

  ep.value=`https://graph.facebook.com/v19.0/${acc}/insights?fields=spend,clicks,impressions,cpc,ctr,date_start,date_stop&date_preset=last_30d`;

let _tokenTimer=null;
function onTokenInput(val){
  const msg=document.getElementById('token-valid-msg'),badge=document.getElementById('api-global-badge'),btn=document.getElementById('btn-save-token');
  clearTimeout(_tokenTimer);
  if(!val||val.length<20){if(msg)msg.innerHTML='<span style="color:var(--t4)">Cole o token acima</span>';return;}
  if(!val.startsWith('EAA')){if(msg)msg.innerHTML='<span style="color:var(--red)">Token deve começar com EAA</span>';return;}
  if(msg)msg.innerHTML='<span style="color:var(--t3)">Validando...</span>';
  _tokenTimer=setTimeout(async()=>{
    const r=await MetaAds.validateToken(val);
    if(r.ok){if(msg)msg.innerHTML=`<span style="color:var(--green)">✓ Válido — ${r.name}</span>`;if(badge){badge.textContent='✓ Válido';badge.className='badge badge-active';}if(btn)btn.disabled=false;}
    else{if(msg)msg.innerHTML=`<span style="color:var(--red)">✕ ${r.error}</span>`;if(badge){badge.textContent='Inválido';badge.className='badge badge-rejected';}if(btn)btn.disabled=true;}
  },900);
}

function toggleTokenVis(){const el=document.getElementById('global-bm-token');if(el)el.type=el.type==='password'?'text':'password';}

async function saveGlobalToken(){
  const token=document.getElementById('global-bm-token')?.value.trim();
  if(!token||!token.startsWith('EAA')){Toast.error('Token inválido');return;}
  await DataLayer.saveGlobalBMToken(token);
  localStorage.setItem('co_bm_token',token);
  Toast.success('Token salvo!');
}

async function testGlobalToken(){
  const token=document.getElementById('global-bm-token')?.value.trim()||await DataLayer.getGlobalBMToken();
  const actId=document.getElementById('test-act-id')?.value.trim()||'';
  const status=document.getElementById('bm-token-status'),box=document.getElementById('test-result-box');
  if(!token){Toast.error('Insira o token primeiro');return;}
  if(status)status.innerHTML=`<div class="api-dot dot-warn"></div><span style="font-size:11px">Testando...</span>`;
  if(box){box.style.display='block';box.innerHTML='Conectando...';}
  const r=await MetaAds.testConnection(actId||'000',token);
  if(r.ok){
    const msg=r.hasData?`Dados encontrados (${r.data.length} período)`:'Conectado — sem anúncios ativos no período (normal)';
    if(status)status.innerHTML=`<div class="api-dot dot-ok"></div><span style="font-size:11px">Conectado</span>`;
    if(box){box.style.cssText='display:block;padding:12px 14px;border-radius:var(--r-m);background:var(--green-bg);border:1px solid rgba(61,184,116,0.3);color:var(--green);font-size:12px;line-height:1.7;margin-bottom:14px';box.innerHTML=`<strong>✓ Conexão bem-sucedida!</strong><br>Token: ${r.tokenUser}<br>${actId?`Conta: ${r.accountName||actId}<br>`:''}${msg}`;}
    Toast.success('Meta Ads conectado!');
  } else {
    const stepMsg={token:'Verifique o token da BM',conta:'Adicione a conta em "Adicionar ativos" no System User',insights:'Verifique permissões ads_read e ads_management'};
    if(status)status.innerHTML=`<div class="api-dot dot-err"></div><span style="font-size:11px">Falhou</span>`;
    if(box){box.style.cssText='display:block;padding:12px 14px;border-radius:var(--r-m);background:var(--red-bg);border:1px solid rgba(224,80,80,0.3);color:var(--red);font-size:12px;line-height:1.7;margin-bottom:14px';box.innerHTML=`<strong>✕ Falhou — etapa: ${r.step}</strong><br>${r.error}<br><span style="font-size:11px;opacity:.8">${stepMsg[r.step]||''}</span>`;}
    Toast.error(`Falhou: ${r.error}`);
  }
}

            <div class="admin-stat"><div class="admin-stat-num num-white" id="adm-total">—</div><div class="admin-stat-label">Total</div></div>
            <div class="admin-stat"><div class="admin-stat-num num-gold" id="adm-pending">—</div><div class="admin-stat-label">Pendentes</div></div>
            <div class="admin-stat"><div class="admin-stat-num num-green" id="adm-active">—</div><div class="admin-stat-label">Ativos</div></div>
          </div>
          <div class="table-card">
            <div class="table-card-header"><span class="table-card-title">Todos os clientes</span><button class="btn-ghost" onclick="refreshClients()">${Icon.refresh}</button></div>
            <div style="overflow-x:auto"><table class="data-table">
              <thead><tr><th>Cliente</th><th>E-mail</th><th>WhatsApp</th><th>Conta Meta Ads</th><th>Plano</th><th>Status</th><th>Cadastro</th><th>Ações</th></tr></thead>
              <tbody id="adm-clients-tbody"><tr><td colspan="8" style="text-align:center;color:var(--t4);padding:28px">Carregando...</td></tr></tbody>
            </table></div>
          </div>
        </div>

        <!-- METRICS -->
        <div class="content-pad hidden" id="at-metrics">
          <div class="page-header"><h2 class="page-title">Métricas <strong>Globais</strong></h2>
            <div class="page-actions"><button class="btn-ghost" onclick="openNotifModal()">${Icon.bell} Notificar clientes</button><button class="btn-ghost" onclick="renderAdminGlobalMetrics()">${Icon.refresh}</button></div>
          </div>
          <div class="metrics-grid" id="adm-metrics-grid"></div>
        </div>

        <!-- API -->
        <div class="content-pad hidden" id="at-api">
          <div class="page-header"><h2 class="page-title">APIs <strong>&amp; Integrações</strong></h2><p class="page-subtitle">Token global da sua BM + act_ID por cliente</p></div>
          <div class="panel-card">
            <div class="panel-card-header"><div><div class="panel-card-title">System User Token — BM Central</div><div class="panel-card-desc">Um token serve para todos os clientes. Cole e valide automaticamente.</div></div><span class="badge" id="api-global-badge" style="background:rgba(255,255,255,.05);color:var(--t3);border:1px solid var(--br-s)">Não configurado</span></div>
            <div class="api-field"><label>System User Token (EAAR...)</label>
              <div style="display:flex;gap:8px"><input class="api-input" type="password" id="global-bm-token" placeholder="EAARxxxxxxxx..." oninput="onTokenInput(this.value)" style="flex:1"><button class="btn-ghost" onclick="toggleTokenVis()">${Icon.eye}</button></div>
              <div id="token-valid-msg" style="margin-top:6px;font-size:11px;color:var(--t4)">Cole o token para validação automática</div>
            </div>
            <div class="api-field"><label>act_ID para testar</label>
              <input class="api-input" id="test-act-id" placeholder="1357843762752546" oninput="updateEndpointDisplay(this.value)">

            </div>
            <div class="api-field"><label>Endpoint gerado</label><input class="api-input" id="endpoint-display" readonly style="font-size:10px;color:var(--t4)"></div>
            <div id="test-result-box" style="display:none"></div>
            <div class="api-actions">
              <button class="btn-gold compact" id="btn-save-token" onclick="saveGlobalToken()">Salvar token</button>
              <button class="sync-btn" onclick="testGlobalToken()">${Icon.signal} Testar conexão</button>
              <div class="api-status-row" id="bm-token-status"><div class="api-dot dot-idle"></div><span style="font-size:11px">Aguardando</span></div>
            </div>
          </div>
          <div class="panel-card">
            <div class="panel-card-title" style="margin-bottom:12px">Como funciona</div>
            ${[['1','Cliente se cadastra com e-mail e senha'],['2','Você aprova em Clientes → clica Config. → coloca o act_ID da conta de anúncios dele'],['3','Token seu + act_ID do cliente = dados isolados só da conta dele'],['4','Cada cliente vê apenas seus próprios dados'],['5','Com anúncios ativos, dados reais aparecem automaticamente']].map(([n,t])=>`
              <div style="display:flex;gap:10px;align-items:flex-start;margin-bottom:8px">

        <!-- LOGS -->

            <table class="data-table"><thead><tr><th>Data/Hora</th><th>Ação</th><th>Detalhe</th></tr></thead>
            <tbody id="adm-logs-tbody"><tr><td colspan="3" style="text-align:center;padding:20px;color:var(--t4)">Carregando...</td></tr></tbody></table>
          </div>
        </div>

      </div>
    </div>

window.loadAdminDash=loadAdminDash;
window.refreshClients=refreshClients;
window.adminAction=adminAction;
window.adminDelete=adminDelete;
window.adminTab=adminTab;
window.loadLogsTable=loadLogsTable;
window.openEditModal=openEditModal;
window.saveClientConfig=saveClientConfig;
window.openNotifModal=openNotifModal;
window.sendAdminNotif=sendAdminNotif;
window.saveGlobalToken=saveGlobalToken;
window.testGlobalToken=testGlobalToken;
window.loadSavedToken=loadSavedToken;
window.onTokenInput=onTokenInput;
window.toggleTokenVis=toggleTokenVis;
window.updateEndpointDisplay=updateEndpointDisplay;
window.renderAdminGlobalMetrics=renderAdminGlobalMetrics;

/* ══════════════════════════════════════════════
   APP CONTROLLER
══════════════════════════════════════════════ */
const App = (() => {
  function render(html){document.getElementById('app').innerHTML=html;}

  async function init(){
    document.body.insertAdjacentHTML('afterbegin',`<div id="loader"><div class="loader-brand">Comércios Online</div><div class="loader-tag">Performance Dashboard</div><div class="loader-bar"><div class="loader-fill"></div></div></div>`);
    setTimeout(async()=>{
      document.getElementById('loader')?.classList.add('out');
      setTimeout(()=>document.getElementById('loader')?.remove(),500);
      try {
        const user=await Auth.currentUser();
        if(user)routeUser(user);else navigate('login');
      } catch(e){console.error(e);navigate('login');}
    },1800);
  }

  function routeUser(user){
    if(!user)return navigate('login');
    if(user.role==='admin')navigate('admin',user);
    else if(user.status==='active')navigate('dashboard',user);
    else navigate('pending',user);
  }

  async function navigate(page,user){
    Charts?.destroyAll?.();
    switch(page){
      case 'login':render(renderLogin());setTimeout(initAuthAnimations,150);break;
      case 'pending':render(renderPending(user));break;
      case 'dashboard':render(clientDashHTML(user));await loadClientDash(user);break;
      case 'admin':render(adminDashHTML(user));await loadAdminDash(user);setTimeout(loadSavedToken,300);break;
    }
  }

  async function logout(){MetaAds?.stopAutoSync?.();await Auth.logout();Toast.info('Até logo!');setTimeout(()=>navigate('login'),300);}

  return {init,navigate,logout,routeUser};
})();
window.App=App;
document.addEventListener('DOMContentLoaded',()=>App.init());

</script>
</body>
</html>
